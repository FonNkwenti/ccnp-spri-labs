!
hostname R2
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description To R4 (ISP-B eBGP)
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R1 (CE-CE iBGP)
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
! Null0 static — anchors the customer /24 in the IP routing table so the
! BGP `network` statement can install it. R2 has no Lo1 representing the /24.
ip route 192.168.1.0 255.255.255.0 Null0
!
! Static route for iBGP loopback peering with R1.
ip route 10.0.0.1 255.255.255.255 10.1.12.1
!
router bgp 65001
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 ! eBGP to ISP-B (R4) — directly connected.
 neighbor 10.1.24.2 remote-as 65200
 neighbor 10.1.24.2 description eBGP to R4 (ISP-B)
 !
 ! iBGP to CE1 (R1) — loopback peering with next-hop-self.
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description iBGP to R1 (CE1)
 neighbor 10.0.0.1 update-source Loopback0
 !
 address-family ipv4
  network 192.168.1.0 mask 255.255.255.0
  neighbor 10.1.24.2 activate
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
