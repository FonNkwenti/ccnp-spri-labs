!
hostname R4
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
!
interface Loopback1
 ip address 10.200.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R2 (ISP-B eBGP toward CE2)
 ip address 10.1.24.2 255.255.255.252
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
