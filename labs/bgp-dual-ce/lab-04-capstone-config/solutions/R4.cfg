!
! R4 — ISP-B PE (AS 65200), peers eBGP with R2 (customer) and iBGP with R6
!
hostname R4
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
!
interface Loopback1
 ip address 10.200.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description to R2 customer eBGP
 ip address 10.1.24.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to R6 ISP-B iBGP
 ip address 10.1.46.1 255.255.255.252
 no shutdown
!
ip route 10.0.0.6 255.255.255.255 10.1.46.2
!
router bgp 65200
 bgp router-id 10.0.0.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.6 remote-as 65200
 neighbor 10.0.0.6 update-source Loopback0
 neighbor 10.0.0.6 description iBGP-R6-ISPB
 !
 neighbor 10.1.24.1 remote-as 65001
 neighbor 10.1.24.1 description eBGP-R2-CUST
 !
 address-family ipv4 unicast
  network 10.200.1.0 mask 255.255.255.0
  !
  neighbor 10.0.0.6 activate
  neighbor 10.0.0.6 next-hop-self
  neighbor 10.0.0.6 send-community
  !
  neighbor 10.1.24.1 activate
  neighbor 10.1.24.1 send-community
 exit-address-family
!
end
