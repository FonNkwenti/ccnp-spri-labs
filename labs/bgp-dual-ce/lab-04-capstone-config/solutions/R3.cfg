!
! R3 — ISP-A PE (AS 65100), peers eBGP with R1 (customer) and iBGP with R5
!
hostname R3
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface Loopback1
 ip address 10.100.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description to R1 customer eBGP
 ip address 10.1.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to R5 ISP-A iBGP
 ip address 10.1.35.1 255.255.255.252
 no shutdown
!
! Static to R5 Lo0 for iBGP update-source reachability
ip route 10.0.0.5 255.255.255.255 10.1.35.2
!
router bgp 65100
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.5 remote-as 65100
 neighbor 10.0.0.5 update-source Loopback0
 neighbor 10.0.0.5 description iBGP-R5-ISPA
 !
 neighbor 10.1.13.1 remote-as 65001
 neighbor 10.1.13.1 description eBGP-R1-CUST
 !
 address-family ipv4 unicast
  network 10.100.1.0 mask 255.255.255.0
  !
  neighbor 10.0.0.5 activate
  neighbor 10.0.0.5 next-hop-self
  neighbor 10.0.0.5 send-community
  !
  neighbor 10.1.13.1 activate
  neighbor 10.1.13.1 send-community
 exit-address-family
!
end
