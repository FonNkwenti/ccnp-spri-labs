!
! R1 — CE1 (AS 65001), peers eBGP with R3 (ISP-A) and iBGP with R2 (CE2)
! Platform: IOS XRv (light, 6.1.x) — XR-mixed retrofit (CE pair on XR)
!
hostname R1
!
interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
!
interface Loopback1
 ipv4 address 192.168.1.1 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to R3 ISP-A eBGP
 ipv4 address 10.1.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description to R2 CE2 iBGP
 ipv4 address 10.1.12.1 255.255.255.252
 no shutdown
!
! Reachability + selective-advertisement anchors
router static
 address-family ipv4 unicast
  10.0.0.2/32 10.1.12.2
  192.168.1.0/25 Null0
 exit
exit
!
! ---- Prefix sets ----
prefix-set CUSTOMER-OUT
  192.168.1.0/24,
  192.168.1.0/25
end-set
!
prefix-set FROM-ISP-A
  0.0.0.0/0 le 32
end-set
!
! ---- Route policies ----
! Outbound to iBGP peer R2 — only customer prefixes (transit prevention)
route-policy CUSTOMER-TO-IBGP
  if destination in CUSTOMER-OUT then
    pass
  else
    drop
  endif
end-policy
!
! Outbound to eBGP R3 — only customer prefixes (transit prevention)
route-policy CUSTOMER-TO-ISPA
  if destination in CUSTOMER-OUT then
    pass
  else
    drop
  endif
end-policy
!
! Inbound from R3 — set LOCAL_PREF 200 (prefer ISP-A as primary egress)
route-policy FROM-ISPA-IN
  if destination in FROM-ISP-A then
    set local-preference 200
  endif
  pass
end-policy
!
! ---- BGP ----
router bgp 65001
 bgp router-id 10.0.0.1
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 192.168.1.0/25
 exit
 !
 neighbor 10.0.0.2
  remote-as 65001
  update-source Loopback0
  description iBGP-R2-CE2
  address-family ipv4 unicast
   next-hop-self
   route-policy CUSTOMER-TO-IBGP out
  exit
 exit
 !
 neighbor 10.1.13.2
  remote-as 65100
  description eBGP-R3-ISPA
  address-family ipv4 unicast
   route-policy FROM-ISPA-IN in
   route-policy CUSTOMER-TO-ISPA out
  exit
 exit
exit
!
end
