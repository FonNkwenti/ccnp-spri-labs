!
! R1 — CE1 (AS 65001), peers eBGP with R3 (ISP-A) and iBGP with R2 (CE2)
!
hostname R1
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 no shutdown
!
interface Loopback1
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0
 description to R3 ISP-A eBGP
 ip address 10.1.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to R2 CE2 iBGP
 ip address 10.1.12.1 255.255.255.252
 no shutdown
!
! Reachability + selective-advertisement anchor
ip route 10.0.0.2 255.255.255.255 10.1.12.2
ip route 192.168.1.0 255.255.255.128 Null0
!
! ---- Prefix lists ----
ip prefix-list CUSTOMER-OUT seq 10 permit 192.168.1.0/24
ip prefix-list CUSTOMER-OUT seq 20 permit 192.168.1.0/25
!
! ---- Route maps ----
! Outbound to iBGP peer R2 — only customer prefixes (transit prevention)
route-map CUSTOMER-TO-IBGP permit 10
 match ip address prefix-list CUSTOMER-OUT
!
! Outbound to eBGP R3 — only customer prefixes (transit prevention)
route-map CUSTOMER-TO-ISPA permit 10
 match ip address prefix-list CUSTOMER-OUT
!
! Inbound from R3 — set LOCAL_PREF 200 (prefer ISP-A as primary egress)
route-map FROM-ISPA-IN permit 10
 set local-preference 200
!
! ---- BGP ----
router bgp 65001
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 update-source Loopback0
 neighbor 10.0.0.2 description iBGP-R2-CE2
 !
 neighbor 10.1.13.2 remote-as 65100
 neighbor 10.1.13.2 description eBGP-R3-ISPA
 !
 address-family ipv4
  network 192.168.1.0 mask 255.255.255.0
  network 192.168.1.0 mask 255.255.255.128
  !
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 next-hop-self
  neighbor 10.0.0.2 route-map CUSTOMER-TO-IBGP out
  !
  neighbor 10.1.13.2 activate
  neighbor 10.1.13.2 route-map FROM-ISPA-IN in
  neighbor 10.1.13.2 route-map CUSTOMER-TO-ISPA out
 exit-address-family
!
end
