!
! R2 — CE2 (AS 65001), peers eBGP with R4 (ISP-B) and iBGP with R1 (CE1)
! AS-path prepend toward R4 makes ISP-A the primary inbound path.
!
hostname R2
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description to R4 ISP-B eBGP
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to R1 CE1 iBGP
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
! Reachability + customer aggregate/selective /25 anchored to Null0
ip route 10.0.0.1 255.255.255.255 10.1.12.1
ip route 192.168.1.0 255.255.255.0 Null0
ip route 192.168.1.128 255.255.255.128 Null0
!
! ---- Prefix lists ----
ip prefix-list CUSTOMER-OUT seq 10 permit 192.168.1.0/24
ip prefix-list CUSTOMER-OUT seq 20 permit 192.168.1.128/25
!
! ---- Route maps ----
route-map CUSTOMER-TO-IBGP permit 10
 match ip address prefix-list CUSTOMER-OUT
!
! Outbound to eBGP R4 — customer prefixes only AND prepend 65001 once
route-map CUSTOMER-TO-ISPB permit 10
 match ip address prefix-list CUSTOMER-OUT
 set as-path prepend 65001
!
! Inbound from R4 — LOCAL_PREF 200 (prefer ISP-B locally on R2)
route-map FROM-ISPB-IN permit 10
 set local-preference 200
!
! ---- BGP ----
router bgp 65001
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.1 description iBGP-R1-CE1
 !
 neighbor 10.1.24.2 remote-as 65200
 neighbor 10.1.24.2 description eBGP-R4-ISPB
 !
 address-family ipv4
  network 192.168.1.0 mask 255.255.255.0
  network 192.168.1.128 mask 255.255.255.128
  !
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
  neighbor 10.0.0.1 route-map CUSTOMER-TO-IBGP out
  !
  neighbor 10.1.24.2 activate
  neighbor 10.1.24.2 route-map FROM-ISPB-IN in
  neighbor 10.1.24.2 route-map CUSTOMER-TO-ISPB out
 exit-address-family
!
end
