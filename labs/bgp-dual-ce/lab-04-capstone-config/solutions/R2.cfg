!
! R2 — CE2 (AS 65001), peers eBGP with R4 (ISP-B) and iBGP with R1 (CE1)
! AS-path prepend toward R4 makes ISP-A the primary inbound path.
! Platform: IOS XRv (light, 6.1.x) — XR-mixed retrofit (CE pair on XR)
!
hostname R2
!
interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description to R4 ISP-B eBGP
 ipv4 address 10.1.24.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description to R1 CE1 iBGP
 ipv4 address 10.1.12.2 255.255.255.252
 no shutdown
!
! Reachability + customer aggregate/selective /25 anchored to Null0
router static
 address-family ipv4 unicast
  10.0.0.1/32 10.1.12.1
  192.168.1.0/24 Null0
  192.168.1.128/25 Null0
 exit
exit
!
! ---- Prefix sets ----
prefix-set CUSTOMER-OUT
  192.168.1.0/24,
  192.168.1.128/25
end-set
!
prefix-set FROM-ISP-B
  0.0.0.0/0 le 32
end-set
!
! ---- Route policies ----
route-policy CUSTOMER-TO-IBGP
  if destination in CUSTOMER-OUT then
    pass
  else
    drop
  endif
end-policy
!
! Outbound to eBGP R4 — customer prefixes only AND prepend 65001 once
route-policy CUSTOMER-TO-ISPB
  if destination in CUSTOMER-OUT then
    prepend as-path 65001 1
    pass
  else
    drop
  endif
end-policy
!
! Inbound from R4 — LOCAL_PREF 200 (prefer ISP-B locally on R2)
route-policy FROM-ISPB-IN
  if destination in FROM-ISP-B then
    set local-preference 200
  endif
  pass
end-policy
!
! ---- BGP ----
router bgp 65001
 bgp router-id 10.0.0.2
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 192.168.1.128/25
 exit
 !
 neighbor 10.0.0.1
  remote-as 65001
  update-source Loopback0
  description iBGP-R1-CE1
  address-family ipv4 unicast
   next-hop-self
   route-policy CUSTOMER-TO-IBGP out
  exit
 exit
 !
 neighbor 10.1.24.2
  remote-as 65200
  description eBGP-R4-ISPB
  address-family ipv4 unicast
   route-policy FROM-ISPB-IN in
   route-policy CUSTOMER-TO-ISPB out
  exit
 exit
exit
!
end
