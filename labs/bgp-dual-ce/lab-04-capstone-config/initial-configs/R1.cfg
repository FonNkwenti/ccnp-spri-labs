!
! R1 — initial config (clean slate, capstone_i)
! Interfaces and addressing only. No BGP. Static route to peer Lo0 for iBGP source.
!
hostname R1
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 no shutdown
!
interface Loopback1
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0
 description to R3 ISP-A
 ip address 10.1.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to R2 CE2
 ip address 10.1.12.1 255.255.255.252
 no shutdown
!
ip route 10.0.0.2 255.255.255.255 10.1.12.2
!
end
