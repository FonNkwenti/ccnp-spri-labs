!
! R1 — initial config (clean slate, capstone_i)
! Platform: IOS XRv (light, 6.1.x) — XR-mixed retrofit (CE pair on XR)
! Interfaces and addressing only. No BGP. Static route to peer Lo0 for iBGP source.
!
hostname R1
!
interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
!
interface Loopback1
 ipv4 address 192.168.1.1 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to R3 ISP-A
 ipv4 address 10.1.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description to R2 CE2
 ipv4 address 10.1.12.1 255.255.255.252
 no shutdown
!
router static
 address-family ipv4 unicast
  10.0.0.2/32 10.1.12.2
 exit
exit
!
end
