!
! R3 — initial config (clean slate, capstone_i)
!
hostname R3
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface Loopback1
 ip address 10.100.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description to R1 customer
 ip address 10.1.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description to R5 ISP-A internal
 ip address 10.1.35.1 255.255.255.252
 no shutdown
!
ip route 10.0.0.5 255.255.255.255 10.1.35.2
!
end
