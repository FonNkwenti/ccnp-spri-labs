!
hostname R2
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description To R4 (ISP-B eBGP)
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R1 (CE-CE iBGP)
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
ip route 192.168.1.0 255.255.255.0 Null0
!
! Selective advertisement: R2 originates the upper /25 toward ISP-B.
ip route 192.168.1.128 255.255.255.128 Null0
!
ip route 10.0.0.1 255.255.255.255 10.1.12.1
!
! Selective egress filter: permit the /24 aggregate AND R2's /25 toward ISP-B.
! Excludes 192.168.1.0/25 (R1's half) so it cannot leak out through R2.
! Lab-02 prepend ×2 stays — applies to both the /24 and the /25-high so
! ISP-A remains preferred as the inbound entry point for the aggregate.
ip prefix-list TRANSIT_PREVENT seq 5 permit 192.168.1.0/24
ip prefix-list TRANSIT_PREVENT seq 10 permit 192.168.1.128/25
!
route-map TRANSIT_PREVENT_OUT permit 10
 description Permit aggregate plus R2's /25; prepend 65001 twice for inbound TE
 match ip address prefix-list TRANSIT_PREVENT
 set as-path prepend 65001 65001
!
! Inbound LOCAL_PREF policy: prefixes from ISP-B get LP=200. R1 also bumps
! prefixes from ISP-A to LP=200, so each CE prefers its own directly-attached
! ISP for the default route (eBGP-over-iBGP tiebreaker once LP ties). On
! failure of one eBGP session, the surviving CE's iBGP advertisement still
! carries LP=200 to the orphaned CE — failover happens cleanly without LP
! re-engineering. Demonstrates LP propagation across iBGP.
route-map LOCAL_PREF_FROM_R4 permit 10
 description LP=200 inbound from ISP-B — secondary preference if ISP-A drops
 set local-preference 200
!
router bgp 65001
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.1.24.2 remote-as 65200
 neighbor 10.1.24.2 description eBGP to R4 (ISP-B)
 !
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description iBGP to R1 (CE1)
 neighbor 10.0.0.1 update-source Loopback0
 !
 address-family ipv4
  network 192.168.1.0 mask 255.255.255.0
  network 192.168.1.128 mask 255.255.255.128
  neighbor 10.1.24.2 activate
  neighbor 10.1.24.2 route-map LOCAL_PREF_FROM_R4 in
  neighbor 10.1.24.2 route-map TRANSIT_PREVENT_OUT out
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
