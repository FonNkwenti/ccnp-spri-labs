!
hostname R1
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
!
interface Loopback1
 description Customer PI prefix 192.168.1.0/24
 ip address 192.168.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R3 (ISP-A eBGP)
 ip address 10.1.13.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R2 (CE-CE iBGP)
 ip address 10.1.12.1 255.255.255.252
 no shutdown
!
ip route 10.0.0.2 255.255.255.255 10.1.12.2
!
! Selective advertisement: originate the lower /25 toward ISP-A in addition to
! the /24 aggregate. ISP-A becomes the longest-match path into the lower half
! of customer space; ISP-B (which originates 192.168.1.128/25) handles the upper.
ip route 192.168.1.0 255.255.255.128 Null0
!
! Selective egress filter: permit only the /24 aggregate AND R1's /25 toward
! ISP-A. This keeps R2's /25 (192.168.1.128/25) out of any leak path through
! R1 even though it is present in the iBGP table.
ip prefix-list TRANSIT_PREVENT seq 5 permit 192.168.1.0/24
ip prefix-list TRANSIT_PREVENT seq 10 permit 192.168.1.0/25
!
route-map TRANSIT_PREVENT_OUT permit 10
 description Permit only customer /24 aggregate and R1's /25 outbound to ISP-A
 match ip address prefix-list TRANSIT_PREVENT
!
! Inbound LOCAL_PREF policy: prefixes from R3 (ISP-A) get LP=200. R2 mirrors
! this on its eBGP session to R4 (ISP-B). Each CE prefers its own ISP for
! egress; on eBGP failure the surviving CE's iBGP advertisement still carries
! LP=200, so failover is automatic. Observable on shared prefixes like the
! default route (locally-originated 192.168.1.0/24 always beats iBGP-learned
! paths, so LP cannot be observed on the customer's own prefix).
route-map LOCAL_PREF_FROM_R3 permit 10
 description LP=200 inbound from ISP-A — make ISP-A the preferred exit
 set local-preference 200
!
router bgp 65001
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.1.13.2 remote-as 65100
 neighbor 10.1.13.2 description eBGP to R3 (ISP-A)
 !
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 description iBGP to R2 (CE2)
 neighbor 10.0.0.2 update-source Loopback0
 !
 address-family ipv4
  network 192.168.1.0 mask 255.255.255.0
  network 192.168.1.0 mask 255.255.255.128
  neighbor 10.1.13.2 activate
  neighbor 10.1.13.2 route-map LOCAL_PREF_FROM_R3 in
  neighbor 10.1.13.2 route-map TRANSIT_PREVENT_OUT out
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
