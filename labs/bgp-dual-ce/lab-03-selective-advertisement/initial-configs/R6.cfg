!
hostname R6
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.6 255.255.255.255
!
interface Loopback1
 description ISP-B internal prefix 10.200.2.0/24
 ip address 10.200.2.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R4 (ISP-B internal)
 ip address 10.1.46.2 255.255.255.252
 no shutdown
!
ip route 10.0.0.4 255.255.255.255 10.1.46.1
!
router bgp 65200
 bgp router-id 10.0.0.6
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.4 remote-as 65200
 neighbor 10.0.0.4 description iBGP to R4 (ISP-B edge)
 neighbor 10.0.0.4 update-source Loopback0
 !
 address-family ipv4
  network 10.200.2.0 mask 255.255.255.0
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
