!
hostname R2
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description To R4 (ISP-B eBGP)
 ip address 10.1.24.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R1 (CE-CE iBGP)
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
ip route 192.168.1.0 255.255.255.0 Null0
!
ip route 10.0.0.1 255.255.255.255 10.1.12.1
!
! TRANSIT_PREVENT_OUT now coalesces two policies on the eBGP egress to ISP-B:
!   1. Filter: only the customer prefix 192.168.1.0/24 is permitted out (lab-01).
!   2. Inbound TE: prepend AS 65001 twice so ISP-B's view of 192.168.1.0/24
!      shows AS-path "65001 65001 65001" while ISP-A's view stays "65001".
!      Result: external networks prefer ISP-A as the entry point to AS 65001.
ip prefix-list TRANSIT_PREVENT seq 5 permit 192.168.1.0/24 le 32
!
route-map TRANSIT_PREVENT_OUT permit 10
 description Filter to customer prefix and prepend 65001 twice for inbound TE
 match ip address prefix-list TRANSIT_PREVENT
 set as-path prepend 65001 65001
!
router bgp 65001
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.1.24.2 remote-as 65200
 neighbor 10.1.24.2 description eBGP to R4 (ISP-B)
 !
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description iBGP to R1 (CE1)
 neighbor 10.0.0.1 update-source Loopback0
 !
 address-family ipv4
  network 192.168.1.0 mask 255.255.255.0
  neighbor 10.1.24.2 activate
  neighbor 10.1.24.2 route-map TRANSIT_PREVENT_OUT out
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
