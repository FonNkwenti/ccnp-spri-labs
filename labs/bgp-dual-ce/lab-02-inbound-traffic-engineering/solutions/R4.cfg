!
hostname R4
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
!
interface Loopback1
 description ISP-B representative prefix 10.200.1.0/24
 ip address 10.200.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R2 (eBGP toward CE2)
 ip address 10.1.24.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R6 (ISP-B internal)
 ip address 10.1.46.1 255.255.255.252
 no shutdown
!
! Static for iBGP loopback reachability inside ISP-B.
ip route 10.0.0.6 255.255.255.255 10.1.46.2
!
router bgp 65200
 bgp router-id 10.0.0.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.1.24.1 remote-as 65001
 neighbor 10.1.24.1 description eBGP to R2 (CE2, AS 65001)
 !
 neighbor 10.0.0.6 remote-as 65200
 neighbor 10.0.0.6 description iBGP to R6 (ISP-B internal)
 neighbor 10.0.0.6 update-source Loopback0
 !
 address-family ipv4
  network 10.200.1.0 mask 255.255.255.0
  neighbor 10.1.24.1 activate
  neighbor 10.0.0.6 activate
  neighbor 10.0.0.6 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
