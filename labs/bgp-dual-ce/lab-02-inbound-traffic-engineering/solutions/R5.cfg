!
hostname R5
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
!
interface Loopback1
 description ISP-A internal prefix 10.100.2.0/24
 ip address 10.100.2.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R3 (ISP-A internal)
 ip address 10.1.35.2 255.255.255.252
 no shutdown
!
ip route 10.0.0.3 255.255.255.255 10.1.35.1
!
router bgp 65100
 bgp router-id 10.0.0.5
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.3 remote-as 65100
 neighbor 10.0.0.3 description iBGP to R3 (ISP-A edge)
 neighbor 10.0.0.3 update-source Loopback0
 !
 address-family ipv4
  network 10.100.2.0 mask 255.255.255.0
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.3 next-hop-self
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
