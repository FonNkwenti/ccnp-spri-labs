!
hostname R6
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.6 255.255.255.255
!
interface Loopback1
 description ISP-B internal prefix 10.200.2.0/24
 ip address 10.200.2.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R4 (ISP-B internal)
 ip address 10.1.46.2 255.255.255.252
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
