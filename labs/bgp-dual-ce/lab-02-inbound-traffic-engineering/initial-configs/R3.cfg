!
hostname R3
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface Loopback1
 description ISP-A representative prefix 10.100.1.0/24
 ip address 10.100.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description To R1 (eBGP toward CE1)
 ip address 10.1.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description To R5 (ISP-A internal)
 ip address 10.1.35.1 255.255.255.252
 no shutdown
!
router bgp 65100
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.1.13.1 remote-as 65001
 neighbor 10.1.13.1 description eBGP to R1 (CE1, AS 65001)
 !
 address-family ipv4
  network 10.100.1.0 mask 255.255.255.0
  neighbor 10.1.13.1 activate
 exit-address-family
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
end
