 description L7 to CE2
 ip address 10.10.122.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description L5 to P1
 ip address 10.10.24.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description L6 to P2
 ip address 10.10.34.4 255.255.255.0
 no shutdown
!
end
