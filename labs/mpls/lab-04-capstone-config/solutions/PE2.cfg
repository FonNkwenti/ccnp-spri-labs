hostname PE2
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Status: Syntactically translated from the IOS sibling solution.
!         Needs EVE-NG verification: boot the lab, push this config to PE2,
!         confirm IS-IS adjacency to P1/P2, LDP neighbor to P1/P2, BGP-LU
!         iBGP to PE1, eBGP to CE2, and RSVP-TE tail-end LSP signaled.
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.4 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L7 to CE2
 ipv4 address 10.10.122.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L5 to P1
 ipv4 address 10.10.24.4 255.255.255.0
 mtu 1514
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description L6 to P2
 ipv4 address 10.10.34.4 255.255.255.0
 mtu 1514
 no shutdown
!
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0004.00
 address-family ipv4 unicast
  metric-style wide
  mpls traffic-eng level-2-only
  mpls traffic-eng router-id Loopback0
 exit
 interface Loopback0
  passive
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/2
  point-to-point
  address-family ipv4 unicast
  exit
 exit
exit
!
mpls ldp
 router-id 10.0.0.4
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
exit
!
rsvp
 interface GigabitEthernet0/0/0/1
  bandwidth 100000 100000
 !
 interface GigabitEthernet0/0/0/2
  bandwidth 100000 100000
 !
exit
!
mpls traffic-eng
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
exit
!
route-policy PASS
  pass
end-policy
!
router bgp 65100
 bgp router-id 10.0.0.4
 address-family ipv4 unicast
  network 10.0.0.4/32
 exit
 address-family ipv4 labeled-unicast
 exit
 neighbor 10.0.0.1
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
   next-hop-self
  exit
  address-family ipv4 labeled-unicast
   route-policy PASS in
   route-policy PASS out
   next-hop-self
  exit
 exit
 neighbor 10.10.122.12
  remote-as 65102
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  exit
 exit
exit
!
end
