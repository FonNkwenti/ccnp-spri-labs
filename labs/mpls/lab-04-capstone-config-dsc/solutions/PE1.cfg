hostname PE1
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Status: Syntactically translated from the IOS sibling solution.
!         Needs EVE-NG verification: boot the lab, push this config to PE1,
!         confirm IS-IS adjacency to P1/P2, LDP neighbor to P1/P2, BGP-LU
!         iBGP to PE2, eBGP to CE1, and RSVP-TE tunnel-te10 up.
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L1 to CE1
 ipv4 address 10.10.111.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L2 to P1
 ipv4 address 10.10.12.1 255.255.255.0
 mtu 1514
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description L3 to P2
 ipv4 address 10.10.13.1 255.255.255.0
 mtu 1514
 no shutdown
!
! ──────────────────────────────────────────────────────────────────────────────
! IS-IS L2 with TE extensions — mpls-te enables the TLV that floods
! interface bandwidth/metric for RSVP-TE CSPF.
! ──────────────────────────────────────────────────────────────────────────────
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0001.00
 address-family ipv4 unicast
  metric-style wide
  mpls traffic-eng level-2-only
  mpls traffic-eng router-id Loopback0
 exit
 interface Loopback0
  passive
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/2
  point-to-point
  address-family ipv4 unicast
  exit
 exit
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! MPLS LDP — XR uses 'mpls ldp' (no 'mpls label protocol' selector — LDP is
! the default and only IGP-discovery protocol on XR). 'router-id force' is
! implicit when the IPv4 address comes from a configured Loopback.
! ──────────────────────────────────────────────────────────────────────────────
mpls ldp
 router-id 10.0.0.1
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! RSVP — explicit per-interface bandwidth statement. XR separates RSVP
! signaling (rsvp) from MPLS-TE forwarding (mpls traffic-eng); IOS folded
! both under 'ip rsvp bandwidth' + 'mpls traffic-eng tunnels'.
! ──────────────────────────────────────────────────────────────────────────────
rsvp
 interface GigabitEthernet0/0/0/1
  bandwidth 100000 100000
 !
 interface GigabitEthernet0/0/0/2
  bandwidth 100000 100000
 !
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! MPLS-TE — explicit-path and tunnel-te interface live under 'mpls traffic-eng'
! XR uses 'tunnel-te<N>' as the interface type (not 'TunnelN').
! ──────────────────────────────────────────────────────────────────────────────
mpls traffic-eng
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
exit
!
explicit-path name PE1-via-P2
 index 10 next-address loose ipv4 unicast 10.0.0.3
 index 20 next-address loose ipv4 unicast 10.0.0.4
exit
!
interface tunnel-te10
 ipv4 unnumbered Loopback0
 destination 10.0.0.4
 autoroute announce
 path-option 10 dynamic
 path-option 20 explicit name PE1-via-P2
 signalled-bandwidth 10000
 priority 1 1
!
! ──────────────────────────────────────────────────────────────────────────────
! Route-policy — XR REQUIRES an explicit policy on every activated AF
! session. PASS allows everything; without a policy, XR drops all updates.
! ──────────────────────────────────────────────────────────────────────────────
route-policy PASS
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! BGP — iBGP to PE2 with labeled-unicast (BGP-LU, RFC 8277), eBGP to CE1.
! address-family ipv4 labeled-unicast replaces IOS 'send-label'.
! ──────────────────────────────────────────────────────────────────────────────
router bgp 65100
 bgp router-id 10.0.0.1
 address-family ipv4 unicast
  network 10.0.0.1/32
 exit
 address-family ipv4 labeled-unicast
 exit
 neighbor 10.0.0.4
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
   next-hop-self
  exit
  address-family ipv4 labeled-unicast
   route-policy PASS in
   route-policy PASS out
   next-hop-self
  exit
 exit
 neighbor 10.10.111.11
  remote-as 65101
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  exit
 exit
exit
!
end
