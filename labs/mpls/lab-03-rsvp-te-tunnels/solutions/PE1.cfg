hostname PE1
!
no ip domain-lookup
!
mpls label protocol ldp
mpls ldp router-id Loopback0 force
mpls traffic-eng tunnels
!
no ip explicit-path name PE1-via-L4
ip explicit-path name PE1-via-P2 enable
 next-address loose 10.0.0.3
 next-address loose 10.0.0.4
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 ip router isis CORE
 no shutdown
!
interface GigabitEthernet0/0
 description L1 to CE1
 ip address 10.10.111.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description L2 to P1
 ip address 10.10.12.1 255.255.255.0
 ip router isis CORE
 isis network point-to-point
 mpls ip
 mpls mtu override 1508
 mpls traffic-eng tunnels
 ip rsvp bandwidth 100000 100000
 no shutdown
!
interface GigabitEthernet0/2
 description L3 to P2
 ip address 10.10.13.1 255.255.255.0
 ip router isis CORE
 isis network point-to-point
 mpls ip
 mpls mtu override 1508
 mpls traffic-eng tunnels
 ip rsvp bandwidth 100000 100000
 no shutdown
!
interface Tunnel10
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.0.0.4
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng bandwidth 10000
 tunnel mpls traffic-eng priority 1 1
 tunnel mpls traffic-eng path-option 10 dynamic
 no tunnel mpls traffic-eng path-option 20
!
interface Tunnel20
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.0.0.4
 tunnel mpls traffic-eng bandwidth 10000
 tunnel mpls traffic-eng priority 1 1
 tunnel mpls traffic-eng path-option 10 explicit name PE1-via-P2
!
router isis CORE
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
 mpls traffic-eng level-2
 mpls traffic-eng router-id Loopback0
!
router bgp 65100
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 neighbor 10.0.0.4 remote-as 65100
 neighbor 10.0.0.4 update-source Loopback0
 neighbor 10.10.111.11 remote-as 65101
 !
 address-family ipv4
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 send-label
  neighbor 10.0.0.4 next-hop-self
  neighbor 10.10.111.11 activate
  network 10.0.0.1 mask 255.255.255.255
 exit-address-family
!
end
