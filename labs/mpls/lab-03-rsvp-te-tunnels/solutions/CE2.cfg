hostname CE2
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.12 255.255.255.255
 no shutdown
!
interface Loopback1
 ip address 198.51.100.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0
 description L7 to PE2
 ip address 10.10.122.12 255.255.255.0
 no shutdown
!
router bgp 65102
 bgp router-id 10.0.0.12
 bgp log-neighbor-changes
 neighbor 10.10.122.4 remote-as 65100
 !
 address-family ipv4
  neighbor 10.10.122.4 activate
  network 198.51.100.0 mask 255.255.255.0
 exit-address-family
!
end
