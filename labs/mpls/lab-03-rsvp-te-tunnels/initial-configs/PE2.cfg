hostname PE2
!
no ip domain-lookup
!
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
 ip router isis CORE
 no shutdown
!
interface GigabitEthernet0/0
 description L7 to CE2
 ip address 10.10.122.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description L5 to P1
 ip address 10.10.24.4 255.255.255.0
 ip router isis CORE
 isis network point-to-point
 mpls ip
 mpls mtu override 1508
 no shutdown
!
interface GigabitEthernet0/2
 description L6 to P2
 ip address 10.10.34.4 255.255.255.0
 ip router isis CORE
 isis network point-to-point
 mpls ip
 mpls mtu override 1508
 no shutdown
!
router isis CORE
 net 49.0001.0000.0000.0004.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
router bgp 65100
 bgp router-id 10.0.0.4
 bgp log-neighbor-changes
 neighbor 10.0.0.1 remote-as 65100
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.10.122.12 remote-as 65102
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 send-label
  neighbor 10.0.0.1 next-hop-self
  neighbor 10.10.122.12 activate
  network 10.0.0.4 mask 255.255.255.255
 exit-address-family
!
end
