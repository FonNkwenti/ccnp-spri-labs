! R2 — Fast Convergence Lab-01 Solution
! Role: SP core; iBGP in AS 65100; IS-IS L2
! Extends: lab-00 (BFD + fast timers); adds IS-IS NSF, BGP GR
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 ip router isis
!
interface GigabitEthernet0/0
 description L1 to R1 (IS-IS L2, BFD single-hop)
 ip address 10.1.12.2 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 no shutdown
!
interface GigabitEthernet0/1
 description L2 to R3 (IS-IS L2, BFD single-hop)
 ip address 10.1.23.2 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 no shutdown
!
router isis
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
 spf-interval 5 50 200
 prc-interval 5 50 200
 nsf ietf
!
router bgp 65100
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 bgp graceful-restart
 !
 ! iBGP full mesh — loopback-sourced, IS-IS carries reachability
 neighbor 10.0.0.1 remote-as 65100
 neighbor 10.0.0.1 description iBGP-R1
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.3 remote-as 65100
 neighbor 10.0.0.3 description iBGP-R3
 neighbor 10.0.0.3 update-source Loopback0
 neighbor 10.0.0.4 remote-as 65100
 neighbor 10.0.0.4 description iBGP-R4
 neighbor 10.0.0.4 update-source Loopback0
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.4 activate
 exit-address-family
!
end
