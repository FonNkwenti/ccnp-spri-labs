! R3 — Fast Convergence Lab-01 Solution
! Role: SP edge / second eBGP to AS 65200; iBGP in AS 65100; IS-IS L2
! Extends: lab-00 (BFD + fast timers); adds IS-IS NSF, BGP GR
!
hostname R3
!
no ip domain-lookup
!
! BFD multi-hop template — used for loopback-sourced eBGP to R5
bfd-template multi-hop BFD_MULTIHOP
 interval min-tx 150 min-rx 150 multiplier 3
!
! Static route to reach R5 loopback for loopback-sourced eBGP
ip route 10.0.0.5 255.255.255.255 10.1.35.5
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip router isis
!
interface GigabitEthernet0/0
 description L2 to R2 (IS-IS L2, BFD single-hop)
 ip address 10.1.23.3 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 no shutdown
!
interface GigabitEthernet0/1
 description L3 to R4 (IS-IS L2, BFD single-hop)
 ip address 10.1.34.3 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 no shutdown
!
interface GigabitEthernet0/2
 description L5 to R1 diagonal (IS-IS L2, BFD single-hop)
 ip address 10.1.13.3 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 no shutdown
!
interface GigabitEthernet0/3
 description L7 to R5 (eBGP, BFD multi-hop via loopback)
 ip address 10.1.35.3 255.255.255.0
 no shutdown
!
router isis
 net 49.0001.0000.0000.0003.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
 spf-interval 5 50 200
 prc-interval 5 50 200
!
! Bind BFD multi-hop template to R5 loopback peer
bfd map ipv4 10.0.0.5/32 10.0.0.3/32 BFD_MULTIHOP
!
router bgp 65100
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 bgp graceful-restart
 !
 ! iBGP full mesh — loopback-sourced, IS-IS carries reachability
 neighbor 10.0.0.1 remote-as 65100
 neighbor 10.0.0.1 description iBGP-R1
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.2 remote-as 65100
 neighbor 10.0.0.2 description iBGP-R2
 neighbor 10.0.0.2 update-source Loopback0
 neighbor 10.0.0.4 remote-as 65100
 neighbor 10.0.0.4 description iBGP-R4
 neighbor 10.0.0.4 update-source Loopback0
 !
 ! eBGP to R5 — loopback-sourced, ebgp-multihop 2, BFD multi-hop
 neighbor 10.0.0.5 remote-as 65200
 neighbor 10.0.0.5 description eBGP-R5-AS65200
 neighbor 10.0.0.5 update-source Loopback0
 neighbor 10.0.0.5 ebgp-multihop 2
 neighbor 10.0.0.5 fall-over bfd multi-hop
 neighbor 10.0.0.5 timers 5 15
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 next-hop-self
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 next-hop-self
  neighbor 10.0.0.5 activate
 exit-address-family
!
end
