! R3 — Fast Convergence Lab-00 Initial Configuration
! Pre-loaded: hostnames, IP addressing, no ip domain lookup
! NOT pre-loaded: IS-IS, BGP, BFD, SPF timers
! Platform: CSR1000v (IOS-XE)
!
hostname R3
!
no ip domain lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface GigabitEthernet1
 description L2 to R2
 ip address 10.1.23.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet2
 description L3 to R4
 ip address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description L5 to R1
 ip address 10.1.13.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet4
 description L7 to R5
 ip address 10.1.35.3 255.255.255.0
 no shutdown
!
end
