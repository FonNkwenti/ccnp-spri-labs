! R1 — Fast Convergence Lab-00 Initial Configuration
! Pre-loaded: hostnames, IP addressing, no ip domain lookup
! NOT pre-loaded: IS-IS, BGP, BFD, SPF timers
! Platform: CSR1000v (IOS-XE)
!
hostname R1
!
no ip domain lookup
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
!
interface GigabitEthernet1
 description L1 to R2
 ip address 10.1.12.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet2
 description L4 to R4
 ip address 10.1.14.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description L5 to R3
 ip address 10.1.13.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet4
 description L6 to R5
 ip address 10.1.15.1 255.255.255.0
 no shutdown
!
end
