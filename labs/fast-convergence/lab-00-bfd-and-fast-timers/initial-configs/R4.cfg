! R4 — Fast Convergence Lab-00 Initial Configuration
! Pre-loaded: hostnames, IP addressing, no ip domain lookup
! NOT pre-loaded: IS-IS, BGP, BFD, SPF timers
! Platform: CSR1000v (IOS-XE)
!
hostname R4
!
no ip domain lookup
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
!
interface GigabitEthernet1
 description L3 to R3
 ip address 10.1.34.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet2
 description L4 to R1
 ip address 10.1.14.4 255.255.255.0
 no shutdown
!
end
