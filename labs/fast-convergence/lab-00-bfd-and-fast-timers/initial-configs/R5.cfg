! R5 — Fast Convergence Lab-00 Initial Configuration
! Pre-loaded: hostnames, IP addressing, no ip domain lookup
! NOT pre-loaded: BGP, BFD, static routes
! Platform: CSR1000v (IOS-XE)
!
hostname R5
!
no ip domain lookup
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
!
interface Loopback1
 description External prefix
 ip address 192.0.2.1 255.255.255.0
!
interface GigabitEthernet1
 description L6 to R1
 ip address 10.1.15.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet2
 description L7 to R3
 ip address 10.1.35.5 255.255.255.0
 no shutdown
!
end
