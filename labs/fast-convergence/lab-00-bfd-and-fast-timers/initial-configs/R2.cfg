! R2 — Fast Convergence Lab-00 Initial Configuration
! Pre-loaded: hostnames, IP addressing, no ip domain-lookup
! NOT pre-loaded: IS-IS, BGP, BFD, SPF timers
!
hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description L1 to R1
 ip address 10.1.12.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description L2 to R3
 ip address 10.1.23.2 255.255.255.0
 no shutdown
!
end
