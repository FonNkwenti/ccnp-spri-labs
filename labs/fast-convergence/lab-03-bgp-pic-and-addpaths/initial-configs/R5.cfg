! R5 — Fast Convergence Lab-03 Initial (Lab-02 Solution)
! Role: External CE in AS 65200; dual-homed eBGP to R1 (L6) and R3 (L7)
! Baseline: BFD + timers + BGP GR
! This lab adds: send-community both + maximum-paths (CE-side prep for PIC)
!
hostname R5
!
no ip domain-lookup
!
! BFD multi-hop template — mirrors R1 and R3 configuration
bfd-template multi-hop BFD_MULTIHOP
 interval min-tx 150 min-rx 150 multiplier 3
!
! Static routes to reach R1 and R3 loopbacks for loopback-sourced eBGP
ip route 10.0.0.1 255.255.255.255 10.1.15.1
ip route 10.0.0.3 255.255.255.255 10.1.35.3
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
!
interface Loopback1
 description External prefix advertised into AS 65100
 ip address 192.0.2.1 255.255.255.0
!
interface GigabitEthernet0/0
 description L6 to R1 (eBGP, BFD multi-hop via loopback)
 ip address 10.1.15.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description L7 to R3 (eBGP, BFD multi-hop via loopback)
 ip address 10.1.35.5 255.255.255.0
 no shutdown
!
! Bind BFD multi-hop template to both SP peer loopbacks
ip bfd peer 10.0.0.1 multihop src 10.0.0.5 template BFD_MULTIHOP
ip bfd peer 10.0.0.3 multihop src 10.0.0.5 template BFD_MULTIHOP
!
router bgp 65200
 bgp router-id 10.0.0.5
 bgp log-neighbor-changes
 bgp graceful-restart
 !
 ! eBGP to R1 — loopback-sourced, ebgp-multihop 2, BFD multi-hop
 neighbor 10.0.0.1 remote-as 65100
 neighbor 10.0.0.1 description eBGP-R1-AS65100
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.1 ebgp-multihop 2
 neighbor 10.0.0.1 fall-over bfd multi-hop
 neighbor 10.0.0.1 timers 5 15
 !
 ! eBGP to R3 — loopback-sourced, ebgp-multihop 2, BFD multi-hop
 neighbor 10.0.0.3 remote-as 65100
 neighbor 10.0.0.3 description eBGP-R3-AS65100
 neighbor 10.0.0.3 update-source Loopback0
 neighbor 10.0.0.3 ebgp-multihop 2
 neighbor 10.0.0.3 fall-over bfd multi-hop
 neighbor 10.0.0.3 timers 5 15
 !
 address-family ipv4
  network 192.0.2.0 mask 255.255.255.0
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.3 activate
 exit-address-family
!
end
