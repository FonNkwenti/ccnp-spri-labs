! R1 — Fast Convergence Lab-03 Solution
! Role: SP edge / eBGP to AS 65200; iBGP in AS 65100; IS-IS L2
! Extends: lab-02 (LFA + R-LFA + MPLS LDP); adds BGP PIC Edge + Add-Paths
!
hostname R1
!
no ip domain-lookup
!
! MPLS LDP for R-LFA tunnel support
mpls ldp router-id Loopback0 force
!
! BFD multi-hop template — used for loopback-sourced eBGP to R5
bfd-template multi-hop BFD_MULTIHOP
 interval min-tx 150 min-rx 150 multiplier 3
!
! Static route to reach R5 loopback for loopback-sourced eBGP
ip route 10.0.0.5 255.255.255.255 10.1.15.5
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 ip router isis
!
interface GigabitEthernet0/0
 description L1 to R2 (IS-IS L2, BFD single-hop, MPLS LDP)
 ip address 10.1.12.1 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 mpls ip
 no shutdown
!
interface GigabitEthernet0/1
 description L4 to R4 (IS-IS L2, BFD single-hop, MPLS LDP)
 ip address 10.1.14.1 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 mpls ip
 no shutdown
!
interface GigabitEthernet0/2
 description L5 to R3 diagonal (IS-IS L2, BFD single-hop, MPLS LDP)
 ip address 10.1.13.1 255.255.255.0
 ip router isis
 isis hello-interval 1
 isis hello-multiplier 3
 bfd interval 150 min_rx 150 multiplier 3
 isis bfd
 mpls ip
 no shutdown
!
interface GigabitEthernet0/3
 description L6 to R5 (eBGP, BFD multi-hop via loopback)
 ip address 10.1.15.1 255.255.255.0
 no shutdown
!
router isis
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
 spf-interval 5 50 200
 prc-interval 5 50 200
 nsf ietf
 nsr
 fast-reroute per-prefix level-2 all
 fast-reroute per-prefix remote-lfa level-2 tunnel mpls-ldp
!
! Bind BFD multi-hop template to R5 loopback peer
ip bfd peer 10.0.0.5 multihop src 10.0.0.1 template BFD_MULTIHOP
!
router bgp 65100
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 bgp graceful-restart
 bgp nsr
 bgp recursion host
 bgp additional-paths install
 bgp additional-paths select backup
 !
 ! iBGP full mesh — loopback-sourced, IS-IS carries reachability
 neighbor 10.0.0.2 remote-as 65100
 neighbor 10.0.0.2 description iBGP-R2
 neighbor 10.0.0.2 update-source Loopback0
 neighbor 10.0.0.3 remote-as 65100
 neighbor 10.0.0.3 description iBGP-R3
 neighbor 10.0.0.3 update-source Loopback0
 neighbor 10.0.0.4 remote-as 65100
 neighbor 10.0.0.4 description iBGP-R4
 neighbor 10.0.0.4 update-source Loopback0
 !
 ! eBGP to R5 — loopback-sourced, ebgp-multihop 2, BFD multi-hop
 neighbor 10.0.0.5 remote-as 65200
 neighbor 10.0.0.5 description eBGP-R5-AS65200
 neighbor 10.0.0.5 update-source Loopback0
 neighbor 10.0.0.5 ebgp-multihop 2
 neighbor 10.0.0.5 fall-over bfd multi-hop
 neighbor 10.0.0.5 timers 5 15
 !
 address-family ipv4
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 next-hop-self
  neighbor 10.0.0.2 advertise additional-paths best 2
  neighbor 10.0.0.2 additional-paths receive
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.3 next-hop-self
  neighbor 10.0.0.3 advertise additional-paths best 2
  neighbor 10.0.0.3 additional-paths receive
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 next-hop-self
  neighbor 10.0.0.4 advertise additional-paths best 2
  neighbor 10.0.0.4 additional-paths receive
  neighbor 10.0.0.5 activate
 exit-address-family
!
end
