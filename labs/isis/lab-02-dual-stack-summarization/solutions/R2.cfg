hostname R2
!
no ip domain-lookup
ipv6 unicast-routing
!
ip prefix-list LEAK_FROM_L2 seq 5 permit 192.168.66.0/24
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 ipv6 address 2001:DB8::2/128
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-1-2
 isis passive
!
interface GigabitEthernet0/0
 description Link to R1 (L1)
 ip address 10.1.12.2 255.255.255.0
 ipv6 address 2001:DB8:12::2/64
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R3 (L2 backbone)
 ip address 10.1.23.2 255.255.255.0
 ipv6 address 2001:DB8:23::2/64
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-2-only
 no shutdown
!
router isis CORE
 net 49.0001.0000.0000.0002.00
 is-type level-1-2
 metric-style wide
 passive-interface Loopback0
 redistribute isis ip level-2 into level-1 distribute-list prefix LEAK_FROM_L2
 address-family ipv6
  multi-topology
  summary-prefix 2001:DB8::/45
 exit-address-family
!
end
