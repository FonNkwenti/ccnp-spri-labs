hostname R3
!
no ip domain-lookup
ipv6 unicast-routing
!
ip route 192.168.66.0 255.255.255.0 10.1.36.6
ipv6 route 2001:DB8:66::/64 2001:DB8:36::6
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ipv6 address 2001:DB8::3/128
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-1
 isis passive
!
interface GigabitEthernet0/0
 description Link to R2 (L2 backbone)
 ip address 10.1.23.3 255.255.255.0
 ipv6 address 2001:DB8:23::3/64
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-2-only
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R4 (L1)
 ip address 10.1.34.3 255.255.255.0
 ipv6 address 2001:DB8:34::3/64
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/2
 description Link to R5 (L1)
 ip address 10.1.35.3 255.255.255.0
 ipv6 address 2001:DB8:35::3/64
 ip router isis CORE
 ipv6 router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/3
 description Link to R6 (external, non-IS-IS)
 ip address 10.1.36.3 255.255.255.0
 ipv6 address 2001:DB8:36::3/64
 no shutdown
!
router isis CORE
 net 49.0002.0000.0000.0003.00
 is-type level-1-2
 metric-style wide
 passive-interface Loopback0
 summary-address 172.16.0.0 255.255.248.0
 redistribute static ip
 address-family ipv6
  multi-topology
  summary-prefix 2001:DB8::/45
  redistribute static
 exit-address-family
!
end
