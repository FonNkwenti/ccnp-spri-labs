hostname R1
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface Loopback1
 ip address 172.16.1.1 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R2 (L1 inside area 49.0001)
 ip address 10.1.12.1 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
router isis CORE
 net 49.0001.0000.0000.0001.00
 is-type level-1
 metric-style wide
 passive-interface Loopback0
 passive-interface Loopback1
!
end
