hostname R4
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface Loopback1
 ip address 172.16.4.1 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R3 (L1 inside area 49.0002)
 ip address 10.1.34.4 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
router isis CORE
 net 49.0002.0000.0000.0004.00
 is-type level-1
 metric-style wide
 passive-interface Loopback0
 passive-interface Loopback1
!
end
