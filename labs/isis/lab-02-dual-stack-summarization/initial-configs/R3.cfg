hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R2 (L2-only backbone adjacency — different areas 49.0001/49.0002)
 ip address 10.1.23.3 255.255.255.0
 ip router isis CORE
 isis circuit-type level-2-only
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R4 (L1 inside area 49.0002)
 ip address 10.1.34.3 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/2
 description Link to R5 (L1 inside area 49.0002)
 ip address 10.1.35.3 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/3
 description Link to R6 (external, non-IS-IS) — activate in lab-02
 no ip address
 shutdown
!
router isis CORE
 net 49.0002.0000.0000.0003.00
 is-type level-1-2
 metric-style wide
 passive-interface Loopback0
!
end
