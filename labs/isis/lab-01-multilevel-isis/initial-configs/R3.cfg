hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R2 (L1 inside area 49.0001 -- lab-00 only; lab-01 promotes to L2)
 ip address 10.1.23.3 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R4 (L1 inside area 49.0002 -- IP pre-loaded; IS-IS student-configured)
 ip address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description Link to R5 (L1 inside area 49.0002 -- IP pre-loaded; IS-IS student-configured)
 ip address 10.1.35.3 255.255.255.0
 no shutdown
!
router isis CORE
 net 49.0001.0000.0000.0003.00
 is-type level-1
 metric-style wide
 passive-interface Loopback0
!
end
