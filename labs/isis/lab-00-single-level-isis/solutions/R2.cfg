hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R1 (L1 inside area 49.0001)
 ip address 10.1.12.2 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R3 (L1 inside area 49.0001 — lab-00 only; lab-01 promotes to L2)
 ip address 10.1.23.2 255.255.255.0
 ip router isis CORE
 isis circuit-type level-1
 no shutdown
!
router isis CORE
 net 49.0001.0000.0000.0002.00
 is-type level-1
 metric-style wide
 passive-interface Loopback0
!
end
