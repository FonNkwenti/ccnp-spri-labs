hostname XR2
!
! ──────────────────────────────────────────────────────────────────────────────
! Interfaces
! ──────────────────────────────────────────────────────────────────────────────
interface Loopback0
 ipv4 address 10.0.0.6 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L7 to R3
 ipv4 address 10.1.36.6 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L8 to XR1
 ipv4 address 10.1.56.6 255.255.255.0
 no shutdown
!
! ──────────────────────────────────────────────────────────────────────────────
! RPL named sets — mirrors XR1 for egress policy demos (Objective 3)
! ──────────────────────────────────────────────────────────────────────────────
prefix-set P_CUSTOMER
  172.16.0.0/16 le 24
end-set
!
prefix-set P_TRANSIT
  172.20.0.0/16 le 24
end-set
!
community-set C_SP_PREF
  65100:100
end-set
!
community-set C_SP_PREF_ALT
  65100:200
end-set
!
as-path-set AS_65200
  ios-regex '_65200$'
end-set
!
! ──────────────────────────────────────────────────────────────────────────────
! RPL policies — same scaffolding as XR1 (paired egress demonstration node)
! ──────────────────────────────────────────────────────────────────────────────
route-policy PASS
  pass
end-policy
!
route-policy SET_LOCAL_PREF_BY_COMMUNITY
  if community matches-any C_SP_PREF then
    set local-preference 150
  elseif community matches-any C_SP_PREF_ALT then
    set local-preference 120
  endif
  pass
end-policy
!
route-policy IBGP_IN
  apply SET_LOCAL_PREF_BY_COMMUNITY
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! IBGP_OUT_EGRESS — demonstration outbound policy on XR2
!   Applies community-based marking before advertising to iBGP peers.
!   Shows how RPL egress policy composes with the same named sets used inbound.
! ──────────────────────────────────────────────────────────────────────────────
route-policy IBGP_OUT_EGRESS
  if community matches-any C_SP_PREF then
    set local-preference 150
  endif
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! IS-IS — joins the SP core IS-IS L2 domain
!   R3 is the IOS peer on L7 (GigabitEthernet0/0/0/0).
!   Note: 'exit' (not '!') is required to exit XR sub-modes when pushing config
!   line-by-line via netmiko. In XR, '!' is a comment; it does not exit a sub-mode.
! ──────────────────────────────────────────────────────────────────────────────
router isis SP
 is-type level-2-only
 net 49.0001.0000.0000.0006.00
 address-family ipv4 unicast
  metric-style wide
 exit
 interface Loopback0
  passive
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  exit
 exit
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! BGP — iBGP full mesh AS 65100
!   neighbor-group replaces IOS peer-group. Route-policies are mandatory on
!   activated address-families once any policy is configured on the session.
! ──────────────────────────────────────────────────────────────────────────────
router bgp 65100
 bgp router-id 10.0.0.6
 address-family ipv4 unicast
 exit
 neighbor-group IBGP
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-policy IBGP_IN in
   route-policy IBGP_OUT_EGRESS out
   next-hop-self
  exit
 exit
 neighbor 10.0.0.1
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.2
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.3
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.5
  use neighbor-group IBGP
 exit
exit
