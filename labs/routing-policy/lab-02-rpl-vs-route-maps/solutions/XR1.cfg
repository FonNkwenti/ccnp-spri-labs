hostname XR1
!
! ──────────────────────────────────────────────────────────────────────────────
! Interfaces
! ──────────────────────────────────────────────────────────────────────────────
interface Loopback0
 ipv4 address 10.0.0.5 255.255.255.255
!
interface Loopback1
 description Customer prefix for RPL match demos
 ipv4 address 172.16.11.1 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description L6 to R2
 ipv4 address 10.1.25.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L8 to XR2
 ipv4 address 10.1.56.5 255.255.255.0
 no shutdown
!
! ──────────────────────────────────────────────────────────────────────────────
! RPL named sets — Objective 3
!   prefix-set, community-set, and as-path-set are defined once and referenced
!   by name in policies below. Contrast with IOS: ip prefix-list and
!   ip community-list are procedural and cannot be composed into hierarchies.
! ──────────────────────────────────────────────────────────────────────────────
prefix-set P_CUSTOMER
  172.16.0.0/16 le 24
end-set
!
prefix-set P_XR1_CUSTOMER
  172.16.11.0/24
end-set
!
prefix-set P_TRANSIT
  172.20.0.0/16 le 24
end-set
!
prefix-set P_BOGONS
  0.0.0.0/0 le 7,
  127.0.0.0/8 le 32,
  169.254.0.0/16 le 32,
  192.0.2.0/24 le 32,
  198.51.100.0/24 le 32,
  203.0.113.0/24 le 32
end-set
!
community-set C_SP_PREF
  65100:100
end-set
!
community-set C_SP_PREF_ALT
  65100:200
end-set
!
as-path-set AS_65200
  ios-regex '_65200$'
end-set
!
! ──────────────────────────────────────────────────────────────────────────────
! RPL policies
! PASS — iBGP scaffolding. Applied on all iBGP sessions that have no specific
!   policy. XR requires an explicit route-policy on every activated AF session;
!   once ANY policy is applied the unmatched result is implicit drop.
! ──────────────────────────────────────────────────────────────────────────────
route-policy PASS
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! FILTER_BOGONS — child policy called by EBGP_IN
!   Ends with 'pass' so that the parent EBGP_IN continues evaluation after this
!   child returns. If 'pass' were omitted, XR would implicitly drop all routes
!   that do not match the if-condition at the policy end.
! ──────────────────────────────────────────────────────────────────────────────
route-policy FILTER_BOGONS
  if destination in P_BOGONS then
    drop
  endif
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! SET_LOCAL_PREF_BY_COMMUNITY — child policy called by EBGP_IN and IBGP_IN
!   Matches standard communities R1/R3 set via IOS route-maps (65100:100/200).
! ──────────────────────────────────────────────────────────────────────────────
route-policy SET_LOCAL_PREF_BY_COMMUNITY
  if community matches-any C_SP_PREF then
    set local-preference 150
  elseif community matches-any C_SP_PREF_ALT then
    set local-preference 120
  endif
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! IBGP_IN — applied inbound on all iBGP sessions
! ──────────────────────────────────────────────────────────────────────────────
route-policy IBGP_IN
  apply SET_LOCAL_PREF_BY_COMMUNITY
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! EBGP_IN — hierarchical parent (Objective 4)
!   Not applied on a live session (XR1 has no eBGP) — defined for workbook
!   comparison tasks and 'show rpl policy EBGP_IN detail' inspection.
! ──────────────────────────────────────────────────────────────────────────────
route-policy EBGP_IN
  apply FILTER_BOGONS
  apply SET_LOCAL_PREF_BY_COMMUNITY
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! MATCH_PREFIX_FROM_SET($set_name) — parameterized RPL (Objective 5)
! ──────────────────────────────────────────────────────────────────────────────
route-policy MATCH_PREFIX_FROM_SET($set_name)
  if destination in $set_name then
    set community (65100:300) additive
    pass
  else
    pass
  endif
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! CLASSIFY_PREFIXES — parent using parameterized child (Objective 5)
! ──────────────────────────────────────────────────────────────────────────────
route-policy CLASSIFY_PREFIXES
  apply MATCH_PREFIX_FROM_SET(P_CUSTOMER)
  apply MATCH_PREFIX_FROM_SET(P_TRANSIT)
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! IS-IS — joins the SP core IS-IS L2 domain
!   Note: 'exit' (not '!') is required to exit XR sub-modes when pushing config
!   line-by-line via netmiko. In XR, '!' is a comment; it does not exit a sub-mode.
! ──────────────────────────────────────────────────────────────────────────────
router isis SP
 is-type level-2-only
 net 49.0001.0000.0000.0005.00
 address-family ipv4 unicast
  metric-style wide
 exit
 interface Loopback0
  passive
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  exit
 exit
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! BGP — iBGP full mesh AS 65100
!   neighbor-group replaces IOS peer-group. Route-policies are mandatory on
!   activated address-families once any policy is configured on the session.
! ──────────────────────────────────────────────────────────────────────────────
router bgp 65100
 bgp router-id 10.0.0.5
 address-family ipv4 unicast
  network 172.16.11.0/24
 exit
 neighbor-group IBGP
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-policy IBGP_IN in
   route-policy PASS out
   next-hop-self
  exit
 exit
 neighbor 10.0.0.1
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.2
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.3
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.6
  use neighbor-group IBGP
 exit
exit
