hostname R3
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip ospf 1 area 0
 ip router isis SP
!
interface GigabitEthernet0/0
 description L2 to R2
 ip address 10.1.23.3 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
interface GigabitEthernet0/1
 description L3 eBGP to R4 (AS 65200)
 ip address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description L5 to R1
 ip address 10.1.13.3 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 passive-interface Loopback0
 redistribute isis SP level-2 subnets route-map ISIS_TO_OSPF
!
router isis SP
 net 49.0001.0000.0000.0003.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
 redistribute ospf 1 route-map OSPF_TO_ISIS
!
router bgp 65100
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor IBGP peer-group
 neighbor IBGP remote-as 65100
 neighbor IBGP update-source Loopback0
 neighbor 10.0.0.1 peer-group IBGP
 neighbor 10.0.0.2 peer-group IBGP
 neighbor 10.1.34.4 remote-as 65200
 !
 address-family ipv4
  neighbor IBGP activate
  neighbor IBGP next-hop-self
  neighbor IBGP send-community both
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.2 activate
  neighbor 10.1.34.4 activate
  neighbor 10.1.34.4 route-map FILTER_R4_ASPATH in
 exit-address-family
!
! ──────────────────────────────────────────────────────────────────────────────
! AS-path ACL — matches routes whose AS-path ends with AS 65200
!   _65200$ anchors to end-of-string; _ also matches space, start, and end
!   so _65200$ matches both " 65200" and "65200" (single-AS path from R4).
!   In this lab topology (R4 is a leaf AS) _65200$ and _65200_ are equivalent;
!   _65200$ is the production-correct form — use it as the model.
! ──────────────────────────────────────────────────────────────────────────────
ip as-path access-list 1 permit _65200$
!
! ──────────────────────────────────────────────────────────────────────────────
! Community lists
! ──────────────────────────────────────────────────────────────────────────────
ip community-list standard COMM_65100_100 permit 65100:100
ip community-list expanded COMM_65100_1XX permit 65100:1[0-9][0-9]
ip community-list expanded COMM_65100_2XX permit 65100:2[0-9]*
!
! ──────────────────────────────────────────────────────────────────────────────
! OSPF_TO_ISIS — loop-prevention version (R3 denies routes tagged by IS-IS)
!   Seq 10: deny routes already tagged 200 — these came from IS-IS via R2/R3
!           and would form a redistribution loop if re-injected into IS-IS
!   Seq 20-40: permit by route-type and tag as OSPF-origin (tag 100)
! ──────────────────────────────────────────────────────────────────────────────
route-map OSPF_TO_ISIS deny 10
 match tag 200
!
route-map OSPF_TO_ISIS permit 20
 match route-type external type-1
 set tag 100
!
route-map OSPF_TO_ISIS permit 30
 match route-type external type-2
 set tag 100
!
route-map OSPF_TO_ISIS permit 40
 match route-type internal
 set tag 100
!
! ──────────────────────────────────────────────────────────────────────────────
! ISIS_TO_OSPF — loop-prevention version (R3 denies routes tagged by OSPF)
!   Seq 10: deny routes already tagged 100 — these came from OSPF via R2/R3
!   Seq 20: permit all other IS-IS routes; tag as IS-IS-origin (tag 200)
! ──────────────────────────────────────────────────────────────────────────────
route-map ISIS_TO_OSPF deny 10
 match tag 100
!
route-map ISIS_TO_OSPF permit 20
 set tag 200
 set metric 20
!
! ──────────────────────────────────────────────────────────────────────────────
! FILTER_R4_ASPATH — inbound on eBGP from R4
!   Seq 10: permit routes from AS 65200 origin; set community 65100:200
!   Seq 20: explicit deny — all other routes blocked (belt-and-suspenders;
!           implicit deny would cover this, but explicit is exam-observable)
! ──────────────────────────────────────────────────────────────────────────────
route-map FILTER_R4_ASPATH permit 10
 match as-path 1
 set community 65100:200
!
route-map FILTER_R4_ASPATH deny 20
!
end
