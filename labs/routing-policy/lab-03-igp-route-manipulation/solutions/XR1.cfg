hostname XR1
!
! ──────────────────────────────────────────────────────────────────────────────
! Interfaces
! ──────────────────────────────────────────────────────────────────────────────
interface Loopback0
 ipv4 address 10.0.0.5 255.255.255.255
!
interface Loopback1
 description Customer prefix for RPL match demos
 ipv4 address 172.16.11.1 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description L6 to R2 (IS-IS L1 adjacency — lab-03)
 ipv4 address 10.1.25.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L8 to XR2 (IS-IS L2 adjacency)
 ipv4 address 10.1.56.5 255.255.255.0
 no shutdown
!
! ──────────────────────────────────────────────────────────────────────────────
! RPL named sets — carried forward from lab-02
! ──────────────────────────────────────────────────────────────────────────────
prefix-set P_CUSTOMER
  172.16.0.0/16 le 24
end-set
!
prefix-set P_XR1_CUSTOMER
  172.16.11.0/24
end-set
!
prefix-set P_TRANSIT
  172.20.0.0/16 le 24
end-set
!
prefix-set P_BOGONS
  0.0.0.0/0 le 7,
  127.0.0.0/8 le 32,
  169.254.0.0/16 le 32,
  192.0.2.0/24 le 32,
  198.51.100.0/24 le 32,
  203.0.113.0/24 le 32
end-set
!
! ── lab-03 Task 5 — filter which prefixes XR1 advertises into IS-IS L1 ──
prefix-set P_XR1_LOOPBACKS
  10.0.0.5/32,
  172.16.11.0/24
end-set
!
community-set C_SP_PREF
  65100:100
end-set
!
community-set C_SP_PREF_ALT
  65100:200
end-set
!
as-path-set AS_65200
  ios-regex '_65200$'
end-set
!
! ──────────────────────────────────────────────────────────────────────────────
! RPL policies — lab-02 carried forward
! ──────────────────────────────────────────────────────────────────────────────
route-policy PASS
  pass
end-policy
!
route-policy FILTER_BOGONS
  if destination in P_BOGONS then
    drop
  endif
  pass
end-policy
!
route-policy SET_LOCAL_PREF_BY_COMMUNITY
  if community matches-any C_SP_PREF then
    set local-preference 150
  elseif community matches-any C_SP_PREF_ALT then
    set local-preference 120
  endif
  pass
end-policy
!
route-policy IBGP_IN
  apply SET_LOCAL_PREF_BY_COMMUNITY
  pass
end-policy
!
route-policy EBGP_IN
  apply FILTER_BOGONS
  apply SET_LOCAL_PREF_BY_COMMUNITY
  pass
end-policy
!
route-policy MATCH_PREFIX_FROM_SET($set_name)
  if destination in $set_name then
    set community (65100:300) additive
    pass
  else
    pass
  endif
end-policy
!
route-policy CLASSIFY_PREFIXES
  apply MATCH_PREFIX_FROM_SET(P_CUSTOMER)
  apply MATCH_PREFIX_FROM_SET(P_TRANSIT)
  pass
end-policy
!
! ── lab-03 Task 5 — IS-IS L1 advertisement filter using RPL apply ─────────────
! ISIS_L1_FILTER_CHILD — inner policy: pass only XR1's own loopbacks into IS-IS
! The 'apply' mechanism in ISIS_L1_FILTER_PARENT demonstrates RPL hierarchical
! composition at the IS-IS protocol level (contrast: IOS uses distribute-list
! prefix-list X out under router isis).
route-policy ISIS_L1_FILTER_CHILD
  if destination in P_XR1_LOOPBACKS then
    pass
  else
    drop
  endif
end-policy
!
route-policy ISIS_L1_FILTER_PARENT
  apply ISIS_L1_FILTER_CHILD
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! IS-IS — lab-03: level-1-2 allows L1 adjacency to R2 and L2 adjacency to XR2
!   circuit-type level-1 on G0/0/0/0 ensures only L1 hellos are sent toward R2
!   (R2's G0/2 uses IOS 'isis circuit-type level-1', so only L1 adjacency forms)
! ──────────────────────────────────────────────────────────────────────────────
router isis SP
 is-type level-1-2
 net 49.0001.0000.0000.0005.00
 address-family ipv4 unicast
  metric-style wide
  ! lab-03 Task 5 — filter IS-IS L1 advertisements; only P_XR1_LOOPBACKS pass
  route-policy ISIS_L1_FILTER_PARENT out
 exit
 interface Loopback0
  passive
  address-family ipv4 unicast
  exit
 exit
 interface Loopback1
  passive
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/0
  circuit-type level-1
  point-to-point
  address-family ipv4 unicast
  exit
 exit
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  exit
 exit
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! BGP — iBGP full mesh AS 65100 (unchanged from lab-02)
! ──────────────────────────────────────────────────────────────────────────────
router bgp 65100
 bgp router-id 10.0.0.5
 address-family ipv4 unicast
  network 172.16.11.0/24
 exit
 neighbor-group IBGP
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-policy IBGP_IN in
   route-policy PASS out
   next-hop-self
  exit
 exit
 neighbor 10.0.0.1
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.2
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.3
  use neighbor-group IBGP
 exit
 neighbor 10.0.0.6
  use neighbor-group IBGP
 exit
exit
