hostname R4
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
!
interface Loopback1
 description External prefix advertised to AS 65100
 ip address 172.20.4.1 255.255.255.0
!
interface Loopback2
 description Second external prefix (filter target on R1)
 ip address 172.20.5.1 255.255.255.0
!
interface GigabitEthernet0/0
 description L3 eBGP to R3 (AS 65100)
 ip address 10.1.34.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description L4 eBGP to R1 (AS 65100)
 ip address 10.1.14.4 255.255.255.0
 no shutdown
!
router bgp 65200
 bgp router-id 10.0.0.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 10.1.14.1 remote-as 65100
 neighbor 10.1.34.3 remote-as 65100
 !
 address-family ipv4
  network 172.20.4.0 mask 255.255.255.0
  network 172.20.5.0 mask 255.255.255.0
  neighbor 10.1.14.1 activate
  neighbor 10.1.34.3 activate
 exit-address-family
!
end
