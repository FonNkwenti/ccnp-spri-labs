hostname R2
!
no ip domain-lookup
ip cef
ip bgp-community new-format
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 ip ospf 1 area 0
 ip router isis SP
!
! ── lab-03 Task 2 — Loopback1 in area 1 makes R2 an ABR for filter-list demo ──
interface Loopback1
 description Area-1 stub loopback — ABR filter-list exercise
 ip address 10.2.1.2 255.255.255.0
 ip ospf 1 area 1
!
interface GigabitEthernet0/0
 description L1 to R1
 ip address 10.1.12.2 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
interface GigabitEthernet0/1
 description L2 to R3
 ip address 10.1.23.2 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
! ── lab-03 Task 4 — circuit-type level-1 restricts this link to IS-IS L1 only ──
interface GigabitEthernet0/2
 description L6 to XR1 (IS-IS L1 adjacency — lab-03)
 ip address 10.1.25.2 255.255.255.0
 ip router isis SP
 isis circuit-type level-1
 isis network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.0.0.2
 passive-interface Loopback0
 redistribute isis SP level-2 subnets route-map ISIS_TO_OSPF
 ! lab-03 Task 2 — R2 as ABR: area 1 stub + filter-list blocks 10.2.1.0/24 from area 0
 area 1 stub
 area 0 filter-list prefix FILTER_TRANSIT in
 ! lab-03 Task 1 — distribute-list filters 172.16.1.0/24 from R2 RIB (LSA stays)
 distribute-list prefix BLOCK_MGMT in
!
router isis SP
 net 49.0001.0000.0000.0002.00
 ! lab-03 Task 4 — level-1-2 makes R2 the L1/L2 boundary between XR1 and the L2 core
 is-type level-1-2
 metric-style wide
 passive-interface Loopback0
 redistribute ospf 1 route-map OSPF_TO_ISIS
 ! lab-03 Task 4 — selective L1->L2 leak: only LEAK_FROM_L1 prefixes pass to L2
 redistribute isis level-1 into level-2 route-map LEAK_L1_TO_L2
!
router bgp 65100
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor IBGP peer-group
 neighbor IBGP remote-as 65100
 neighbor IBGP update-source Loopback0
 neighbor 10.0.0.1 peer-group IBGP
 neighbor 10.0.0.3 peer-group IBGP
 neighbor 10.0.0.5 peer-group IBGP
 neighbor 10.0.0.6 peer-group IBGP
 !
 address-family ipv4
  neighbor IBGP activate
  neighbor IBGP send-community both
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.5 activate
  neighbor 10.0.0.6 activate
 exit-address-family
!
ip community-list standard COMM_65100_100 permit 65100:100
ip community-list expanded COMM_65100_1XX permit 65100:1[0-9][0-9]
ip community-list expanded COMM_65100_2XX permit 65100:2[0-9]*
!
! ── lab-03 Task 1 — deny 172.16.1.0/24 from OSPF RIB; LSA Type 5 persists ──
ip prefix-list BLOCK_MGMT seq 5 deny 172.16.1.0/24
ip prefix-list BLOCK_MGMT seq 10 permit 0.0.0.0/0 le 32
!
! ── lab-03 Task 2 — block area-1 loopback from Type 3 LSA flooding into area 0 ──
ip prefix-list FILTER_TRANSIT seq 5 deny 10.2.1.0/24
ip prefix-list FILTER_TRANSIT seq 10 permit 0.0.0.0/0 le 32
!
! ── lab-03 Task 4 — prefixes to leak from IS-IS L1 (XR1) into L2 ──
ip prefix-list LEAK_FROM_L1 seq 5 permit 10.0.0.5/32
ip prefix-list LEAK_FROM_L1 seq 10 permit 172.16.11.0/24
!
! ── OSPF_TO_ISIS updated lab-03 Task 6 ──
! deny tag 200 first (loop-prevention: blocks IS-IS→OSPF→IS-IS re-redistribution)
route-map OSPF_TO_ISIS deny 10
 match tag 200
!
! OSPF external type-1 → IS-IS with metric-type internal and tag 300
route-map OSPF_TO_ISIS permit 20
 match route-type external type-1
 set tag 300
 set metric-type internal
!
! OSPF external type-2 → IS-IS with metric-type internal and tag 300
route-map OSPF_TO_ISIS permit 30
 match route-type external type-2
 set tag 300
 set metric-type internal
!
! OSPF internal routes → IS-IS with tag 100 (unchanged from lab-02)
route-map OSPF_TO_ISIS permit 40
 match route-type internal
 set tag 100
!
route-map ISIS_TO_OSPF permit 10
 set tag 200
 set metric 20
!
! ── lab-03 Task 4 — LEAK_L1_TO_L2: permit only prefixes from LEAK_FROM_L1 ──
route-map LEAK_L1_TO_L2 permit 10
 match ip address prefix-list LEAK_FROM_L1
!
end
