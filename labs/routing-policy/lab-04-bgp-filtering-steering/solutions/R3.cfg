hostname R3
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip ospf 1 area 0
 ip router isis SP
!
interface GigabitEthernet0/0
 description L2 to R2
 ip address 10.1.23.3 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
interface GigabitEthernet0/1
 description L3 eBGP to R4 (AS 65200)
 ip address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description L5 to R1
 ip address 10.1.13.3 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
interface GigabitEthernet0/3
 description L7 to XR2 (IS-IS L2 adjacency)
 ip address 10.1.36.3 255.255.255.0
 ip router isis SP
 isis network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 passive-interface Loopback0
 redistribute isis SP level-2 subnets route-map ISIS_TO_OSPF
!
router isis SP
 net 49.0001.0000.0000.0003.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
 redistribute ospf 1 route-map OSPF_TO_ISIS
!
! ── lab-04 Task 2 — null route anchors the aggregate on R3
ip route 172.16.0.0 255.255.0.0 Null0
!
router bgp 65100
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor IBGP peer-group
 neighbor IBGP remote-as 65100
 neighbor IBGP update-source Loopback0
 neighbor 10.0.0.1 peer-group IBGP
 neighbor 10.0.0.2 peer-group IBGP
 neighbor 10.0.0.5 peer-group IBGP
 neighbor 10.0.0.6 peer-group IBGP
 neighbor 10.1.34.4 remote-as 65200
 !
 address-family ipv4
  ! lab-04 Task 2 — aggregate 172.16.0.0/16 (no summary-only in final state so
  !   specific prefixes remain advertised for Tasks 4/5 to work correctly)
  aggregate-address 172.16.0.0 255.255.0.0
  neighbor IBGP activate
  neighbor IBGP next-hop-self
  neighbor IBGP send-community both
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.5 activate
  neighbor 10.0.0.6 activate
  neighbor 10.1.34.4 activate
  ! Task 3 — inbound: LOCAL_PREF 200 on 172.20.4.0/24, community on AS 65200 routes
  neighbor 10.1.34.4 route-map STEER_R4_IN in
  ! Task 5 — outbound: MED 50 on 172.16.0.0/16 aggregate to R4
  neighbor 10.1.34.4 route-map R3_TO_R4_OUT out
 exit-address-family
!
ip as-path access-list 1 permit _65200$
!
ip community-list standard COMM_65100_100 permit 65100:100
ip community-list expanded COMM_65100_1XX permit 65100:1[0-9][0-9]
ip community-list expanded COMM_65100_2XX permit 65100:2[0-9]*
!
! ── lab-04 prefix-lists ──
! Match 172.20.4.0/24 exactly — used to set LOCAL_PREF 200 (Task 3)
ip prefix-list PFX_PREFER_172_20_4 seq 5 permit 172.20.4.0/24
! Match the aggregate — used to set MED 50 outbound (Task 5)
ip prefix-list PFX_16_0_AGGREGATE seq 5 permit 172.16.0.0/16
!
! ── OSPF_TO_ISIS — loop-prevention version (deny tag 200 blocks re-redistribution loops)
route-map OSPF_TO_ISIS deny 10
 match tag 200
!
route-map OSPF_TO_ISIS permit 20
 match route-type external type-1
 set tag 100
!
route-map OSPF_TO_ISIS permit 30
 match route-type external type-2
 set tag 100
!
route-map OSPF_TO_ISIS permit 40
 match route-type internal
 set tag 100
!
! ── ISIS_TO_OSPF — loop-prevention version (deny tag 100 blocks IS-IS→OSPF→IS-IS loops)
route-map ISIS_TO_OSPF deny 10
 match tag 100
!
route-map ISIS_TO_OSPF permit 20
 set tag 200
 set metric 20
!
! ── Task 3 — STEER_R4_IN: inbound on eBGP from R4, replaces FILTER_R4_ASPATH ──
! Seq 10: Prefer 172.20.4.0/24 via R3 by setting LOCAL_PREF 200 (R1 default is 150)
route-map STEER_R4_IN permit 10
 match ip address prefix-list PFX_PREFER_172_20_4
 set local-preference 200
 set community 65100:200
!
! Seq 20: Accept remaining AS 65200 routes with community tag (AS-path filter carried)
route-map STEER_R4_IN permit 20
 match as-path 1
 set community 65100:200
!
! Seq 30: implicit deny — routes not originating from AS 65200 are rejected
route-map STEER_R4_IN deny 30
!
! ── Task 5 — R3_TO_R4_OUT: outbound to R4 ──
! MED 50 on 172.16.0.0/16 aggregate (vs R1's MED 100 → R4 prefers R3 path inbound)
route-map R3_TO_R4_OUT permit 10
 match ip address prefix-list PFX_16_0_AGGREGATE
 set metric 50
!
! Permit everything else unchanged
route-map R3_TO_R4_OUT permit 20
!
end
