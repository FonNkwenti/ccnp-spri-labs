hostname R1
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 ip ospf 1 area 0
 ip router isis SP
!
interface Loopback1
 description Customer prefix advertised into BGP
 ip address 172.16.1.1 255.255.255.0
!
interface GigabitEthernet0/0
 description L1 to R2
 ip address 10.1.12.1 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip ospf prefix-suppression
 ip router isis SP
 isis network point-to-point
 no shutdown
!
interface GigabitEthernet0/1
 description L4 eBGP to R4 (AS 65200)
 ip address 10.1.14.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description L5 to R3
 ip address 10.1.13.1 255.255.255.0
 ip ospf network point-to-point
 ip ospf 1 area 0
 ip ospf prefix-suppression
 ip router isis SP
 isis network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.0.0.1
 passive-interface Loopback0
 redistribute connected metric-type 1 subnets
!
router isis SP
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
! ── lab-04 Task 2 — null route anchors the aggregate; BGP will not originate
!    172.16.0.0/16 unless at least one more-specific is in the routing table
ip route 172.16.0.0 255.255.0.0 Null0
!
! ── lab-04 Task 7 — backup route (advertised conditionally only when primary aggregate
!    is absent from R4's BGP table, i.e. R3 is withdrawn)
ip route 172.16.100.0 255.255.255.0 Null0
!
router bgp 65100
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor IBGP peer-group
 neighbor IBGP remote-as 65100
 neighbor IBGP update-source Loopback0
 neighbor 10.0.0.2 peer-group IBGP
 neighbor 10.0.0.3 peer-group IBGP
 neighbor 10.0.0.5 peer-group IBGP
 neighbor 10.0.0.6 peer-group IBGP
 neighbor 10.1.14.4 remote-as 65200
 !
 address-family ipv4
  network 172.16.1.0 mask 255.255.255.0
  ! lab-04 Task 7 — backup prefix (conditionally advertised)
  network 172.16.100.0 mask 255.255.255.0
  ! lab-04 Task 2 — aggregate 172.16.0.0/16; no summary-only so specific prefixes
  !   remain advertised (Tasks 4/5 need the /24 specific to be visible at R4)
  aggregate-address 172.16.0.0 255.255.0.0
  neighbor IBGP activate
  neighbor IBGP next-hop-self
  neighbor IBGP send-community both
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.5 activate
  neighbor 10.0.0.6 activate
  neighbor 10.1.14.4 activate
  ! Task 1 — inbound prefix-list filter from R4 (carried from lab-03)
  neighbor 10.1.14.4 route-map FILTER_R4_IN in
  ! Task 4/5 — outbound: prepend 3× on specific, MED 100 on aggregate
  neighbor 10.1.14.4 route-map R1_TO_R4_OUT out
  ! Task 7 — conditional advertisement: send BACKUP_ADV only when TRACK_PRIMARY absent
  neighbor 10.1.14.4 advertise-map BACKUP_ADV non-exist-map TRACK_PRIMARY
 exit-address-family
!
access-list 10 permit 172.20.4.0 0.0.0.255
!
ip access-list extended ACL_EXT_R4_LO2
 permit ip 172.20.5.0 0.0.0.255 any
!
! ── Task 1 inbound filters (carried from lab-03) ──
ip prefix-list PFX_R4_LE_24 seq 5 permit 172.20.0.0/16 ge 24 le 24
ip prefix-list PFX_R4_LO2_EXACT seq 5 permit 172.20.5.0/24
!
! ── lab-04 outbound filters ──
ip prefix-list PFX_16_1_EXACT seq 5 permit 172.16.1.0/24
ip prefix-list PFX_16_0_AGGREGATE seq 5 permit 172.16.0.0/16
ip prefix-list PFX_BACKUP_COND seq 5 permit 172.16.100.0/24
ip prefix-list PFX_TRACK_AGGREGATE seq 5 permit 172.16.0.0/16
!
ip community-list standard COMM_65100_100 permit 65100:100
ip community-list expanded COMM_65100_1XX permit 65100:1[0-9][0-9]
ip community-list expanded COMM_65100_2XX permit 65100:2[0-9]*
!
! ── Task 1 — inbound from R4: deny 172.20.5.0/24, set community on /24s ──
route-map FILTER_R4_IN deny 10
 match ip address prefix-list PFX_R4_LO2_EXACT
!
route-map FILTER_R4_IN permit 20
 match ip address prefix-list PFX_R4_LE_24
 set community 65100:100
 set local-preference 150
!
! ── Task 4/5 — outbound to R4 ──
! Seq 10: 172.16.1.0/24 specific — prepend 3× so AS 65200 prefers the R3 path
route-map R1_TO_R4_OUT permit 10
 match ip address prefix-list PFX_16_1_EXACT
 set as-path prepend 65100 65100 65100
!
! Seq 20: 172.16.0.0/16 aggregate — MED 100 (R3 sets MED 50; R4 prefers lower MED)
route-map R1_TO_R4_OUT permit 20
 match ip address prefix-list PFX_16_0_AGGREGATE
 set metric 100
!
! Seq 30: permit everything else unchanged
route-map R1_TO_R4_OUT permit 30
!
! ── Task 7 — conditional advertisement ──
! BACKUP_ADV: the prefix to send conditionally
route-map BACKUP_ADV permit 10
 match ip address prefix-list PFX_BACKUP_COND
!
! TRACK_PRIMARY: the trigger prefix — advertise BACKUP_ADV only when this is absent
route-map TRACK_PRIMARY permit 10
 match ip address prefix-list PFX_TRACK_AGGREGATE
!
! ── Demo route-maps carried from lab-03 ──
route-map DEMO_WELL_KNOWN permit 10
 match ip address prefix-list PFX_R4_LE_24
 set community no-export
!
route-map DEMO_CONTINUE permit 10
 match ip address prefix-list PFX_R4_LE_24
 set community 65100:100
 continue 20
!
route-map DEMO_CONTINUE permit 20
 set local-preference 200
!
route-map DEMO_REDIST permit 10
 match ip address 10
 set tag 100
!
end
