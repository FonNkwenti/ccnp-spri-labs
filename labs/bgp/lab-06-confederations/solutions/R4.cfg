hostname R4
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
!
interface GigabitEthernet0/0
 description Link to R2 (PE East-1)
 ip address 10.1.24.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R3 (PE East-2)
 ip address 10.1.34.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description Link to R5 (PE West)
 ip address 10.1.45.4 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.4
 network 10.0.0.4 0.0.0.0 area 0
 network 10.1.24.0 0.0.0.255 area 0
 network 10.1.34.0 0.0.0.255 area 0
 network 10.1.45.0 0.0.0.255 area 0
!
router bgp 65102
 bgp router-id 10.0.0.4
 bgp log-neighbor-changes
 bgp confederation identifier 65100
 bgp confederation peers 65101
 !
 ! Confederation eBGP to sub-AS 65101 — direct links, next-hop auto-rewrites
 neighbor 10.1.24.2 remote-as 65101
 neighbor 10.1.34.3 remote-as 65101
 !
 ! iBGP within sub-AS 65102 — loopback-based, next-hop-self required
 neighbor 10.0.0.5 remote-as 65102
 neighbor 10.0.0.5 update-source Loopback0
 neighbor 10.0.0.5 next-hop-self
 !
 address-family ipv4
  neighbor 10.1.24.2 activate
  neighbor 10.1.34.3 activate
  neighbor 10.0.0.5 activate
 exit-address-family
