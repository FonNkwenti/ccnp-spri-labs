hostname R5
no ip domain lookup
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
!
interface GigabitEthernet2
 description Link to R4 (SP Core)
 ip address 10.1.45.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description Link to R6 (External SP Peer)
 ip address 10.1.56.5 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.5
 network 10.0.0.5 0.0.0.0 area 0
 network 10.1.45.0 0.0.0.255 area 0
!
router bgp 65102
 bgp router-id 10.0.0.5
 bgp log-neighbor-changes
 bgp confederation identifier 65100
 bgp confederation peers 65101
 !
 ! iBGP within sub-AS 65102 — loopback-based, next-hop-self required
 ! (10.1.56.0/24 not in OSPF, so R4 cannot resolve R6's next-hop without this)
 neighbor 10.0.0.4 remote-as 65102
 neighbor 10.0.0.4 update-source Loopback0
 neighbor 10.0.0.4 next-hop-self
 !
 ! External eBGP to SP Peer (AS 65002)
 neighbor 10.1.56.6 remote-as 65002
 !
 address-family ipv4
  neighbor 10.0.0.4 activate
  neighbor 10.1.56.6 activate
 exit-address-family
