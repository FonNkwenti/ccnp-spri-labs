hostname R2
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0
 description Link to R1 (Customer A CE)
 ip address 10.1.12.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R4 (SP Core)
 ip address 10.1.24.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description Link to R3 (PE East-2, iBGP peer)
 ip address 10.1.23.2 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.2
 network 10.0.0.2 0.0.0.0 area 0
 network 10.1.24.0 0.0.0.255 area 0
 network 10.1.23.0 0.0.0.255 area 0
!
router bgp 65101
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 bgp confederation identifier 65100
 bgp confederation peers 65102
 !
 ! iBGP within sub-AS 65101 — loopback-based, next-hop-self required
 neighbor 10.0.0.3 remote-as 65101
 neighbor 10.0.0.3 update-source Loopback0
 neighbor 10.0.0.3 next-hop-self
 !
 ! Confederation eBGP to sub-AS 65102 — direct link, next-hop auto-rewrites
 neighbor 10.1.24.4 remote-as 65102
 !
 ! External eBGP to Customer A
 neighbor 10.1.12.1 remote-as 65001
 !
 address-family ipv4
  neighbor 10.0.0.3 activate
  neighbor 10.1.24.4 activate
  neighbor 10.1.12.1 activate
 exit-address-family
