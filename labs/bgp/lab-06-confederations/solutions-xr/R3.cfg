hostname R3
!
! ──────────────────────────────────────────────────────────────────────────────
! IOS-XR equivalent of solutions/R3.cfg — appendix-only reference.
!
! Posture: this file is a SIDE-BY-SIDE READ for students who want to see
! IOS XR's confederation configuration model. The lab itself runs IOSv;
! this XR config is NOT booted as part of the lab.
!
! Key XR differences from the IOS sibling:
!   - 'bgp confederation identifier' and 'bgp confederation peers' use the
!     same keywords, but live inside 'router bgp <sub-as>' the same way
!   - 'next-hop-self' is per-AF (under address-family ipv4 unicast on the
!     neighbor), not a global neighbor knob
!   - PASS route-policy mandatory on every activated AF (XR drops without)
!   - confed-eBGP next-hop behavior matches IOS (no auto-rewrite to self),
!     so next-hop-self is still required toward the other sub-AS
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.3 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description Link to R1 (Customer A CE, backup path)
 ipv4 address 10.1.13.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description Link to R4 (SP Core, confed-eBGP to sub-AS 65102)
 ipv4 address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description Link to R2 (PE East-1, iBGP within sub-AS 65101)
 ipv4 address 10.1.23.3 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/1
  exit
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
route-policy PASS
  pass
end-policy
!
router bgp 65101
 bgp router-id 10.0.0.3
 bgp confederation identifier 65100
 bgp confederation peers 65102
 address-family ipv4 unicast
 exit
 !
 ! iBGP within sub-AS 65101 — loopback-based, next-hop-self required
 neighbor 10.0.0.2
  remote-as 65101
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
   route-policy PASS in
   route-policy PASS out
  exit
 exit
 !
 ! Confederation eBGP to sub-AS 65102 — next-hop-self required;
 ! XR (like IOS) does NOT auto-rewrite next-hop on confed-eBGP
 neighbor 10.1.34.4
  remote-as 65102
  address-family ipv4 unicast
   next-hop-self
   route-policy PASS in
   route-policy PASS out
  exit
 exit
 !
 ! External eBGP to Customer A (backup path)
 neighbor 10.1.13.1
  remote-as 65001
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  exit
 exit
exit
!
end
