hostname R4
!
! ──────────────────────────────────────────────────────────────────────────────
! IOS-XR equivalent of solutions/R4.cfg — appendix-only reference.
!
! Posture: this file is a SIDE-BY-SIDE READ for students who want to see
! IOS XR's route-reflector configuration model. The lab itself runs IOSv;
! this XR config is NOT booted as part of the lab. To exercise it on real
! hardware, see the XR-mixed retrofit of bgp/lab-07-capstone-config or the
! xr-bridge bonus topic.
!
! Key XR differences from the IOS sibling:
!   - 'cluster-id' lives under 'router bgp' (IOS: same)
!   - 'route-reflector-client' is a per-AF neighbor property under the
!     session-AF block, not under 'address-family ipv4' globally
!   - neighbor-group consolidates the 3 RR-client neighbor stanzas
!   - PASS route-policy is mandatory on every activated AF (XR drops without)
!   - 'send-community' is implicit; communities propagate unless a policy
!     strips them
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.4 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.24.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.34.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 ipv4 address 10.1.45.4 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.4
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
  interface GigabitEthernet0/0/0/1
  exit
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
route-policy PASS
  pass
end-policy
!
router bgp 65100
 bgp router-id 10.0.0.4
 bgp cluster-id 10.0.0.4
 address-family ipv4 unicast
 exit
 neighbor-group RR-CLIENTS
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-reflector-client
   route-policy PASS in
   route-policy PASS out
  exit
 exit
 neighbor 10.0.0.2
  use neighbor-group RR-CLIENTS
  description iBGP-RR-client-R2
 exit
 neighbor 10.0.0.3
  use neighbor-group RR-CLIENTS
  description iBGP-RR-client-R3
 exit
 neighbor 10.0.0.5
  use neighbor-group RR-CLIENTS
  description iBGP-RR-client-R5
 exit
exit
!
end
