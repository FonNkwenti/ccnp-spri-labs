hostname R2
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R1 Customer-A-CE (L1 eBGP primary)
 ip address 10.1.12.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R4 P-router (L3 OSPF/iBGP)
 ip address 10.1.24.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description Link to R3 PE-East-2 (L6 OSPF IGP)
 ip address 10.1.23.2 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.2
 network 10.0.0.2 0.0.0.0 area 0
 network 10.1.24.0 0.0.0.255 area 0
 network 10.1.23.0 0.0.0.255 area 0
!
router bgp 65100
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 neighbor 10.1.12.1 remote-as 65001
 neighbor 10.1.12.1 description Customer-A-CE-R1
 neighbor 10.0.0.5 remote-as 65100
 neighbor 10.0.0.5 description iBGP-PE-West-R5
 neighbor 10.0.0.5 update-source Loopback0
 !
 address-family ipv4
  neighbor 10.1.12.1 activate
  neighbor 10.0.0.5 activate
  neighbor 10.0.0.5 next-hop-self
 exit-address-family
!
end
