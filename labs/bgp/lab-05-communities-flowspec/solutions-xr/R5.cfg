hostname R5
!
! ──────────────────────────────────────────────────────────────────────────────
! IOS-XR equivalent of solutions/R5.cfg — appendix-only reference.
!
! Posture: this file is a SIDE-BY-SIDE READ for students who want to see
! IOS XR's community + FlowSpec configuration model. The lab itself runs
! IOSv/CSR1000v; this XR config is NOT booted as part of the lab.
!
! Key XR differences from the IOS sibling:
!   - Communities are matched/set via 'community-set' RPL objects, not
!     'ip community-list' + 'route-map'
!   - 'no-export' is the well-known community 'no-export' inside community-set
!   - 'send-community' is implicit; communities propagate unless a policy
!     strips them (no 'send-community both' needed)
!   - FlowSpec AF: 'address-family ipv4 flowspec' under router bgp + a
!     top-level 'flowspec' stanza with 'local-install interface-all'
!     (same name, different syntax)
!   - Dampening lives under address-family, not under router bgp directly
!   - 'maximum-prefix' is a per-AF neighbor knob; 'warning-only' becomes
!     the 4th positional arg ('warning-only')
!   - PASS route-policy mandatory on every activated AF
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.5 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description Link to R4 P-router/RR
 ipv4 address 10.1.45.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description Link to R6 External-SP-Peer
 ipv4 address 10.1.56.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description Link to R7 External-Peer-AS65003 (FlowSpec)
 ipv4 address 10.1.57.5 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.5
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
 exit
exit
!
prefix-set EXT-PEER-R6
  172.16.6.0/24
end-set
!
community-set NO_EXPORT_WK
  no-export
end-set
!
route-policy PASS
  pass
end-policy
!
route-policy FROM-R6-APPLY-NOEXP
  if destination in EXT-PEER-R6 then
    set community NO_EXPORT_WK additive
  endif
  pass
end-policy
!
router bgp 65100
 bgp router-id 10.0.0.5
 address-family ipv4 unicast
  bgp dampening 15 750 2000 60
 exit
 address-family ipv4 flowspec
 exit
 !
 neighbor 10.1.56.6
  remote-as 65002
  description External-SP-Peer-R6
  ttl-security
  password CISCO_SP
  address-family ipv4 unicast
   route-policy FROM-R6-APPLY-NOEXP in
   route-policy PASS out
   maximum-prefix 100 75 warning-only
  exit
 exit
 neighbor 10.1.57.7
  remote-as 65003
  description External-Peer-R7-AS65003-FlowSpec
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  exit
  address-family ipv4 flowspec
   route-policy PASS in
   route-policy PASS out
  exit
 exit
 neighbor 10.0.0.4
  remote-as 65100
  description iBGP-RR-R4
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
   route-policy PASS in
   route-policy PASS out
  exit
 exit
 neighbor 10.0.0.2
  remote-as 65100
  description iBGP-PE-East-1-R2-legacy
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
   route-policy PASS in
   route-policy PASS out
  exit
 exit
exit
!
flowspec
 address-family ipv4
  local-install interface-all
 exit
exit
!
end
