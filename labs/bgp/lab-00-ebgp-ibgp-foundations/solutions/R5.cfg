hostname R5
!
no ip domain lookup
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
 no shutdown
!
interface GigabitEthernet2
 description Link to R4 P-router (L5 OSPF/iBGP)
 ip address 10.1.45.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description Link to R6 External-SP-Peer (L7 eBGP)
 ip address 10.1.56.5 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.5
 network 10.0.0.5 0.0.0.0 area 0
 network 10.1.45.0 0.0.0.255 area 0
!
router bgp 65100
 bgp router-id 10.0.0.5
 bgp log-neighbor-changes
 neighbor 10.1.56.6 remote-as 65002
 neighbor 10.1.56.6 description External-SP-Peer-R6
 neighbor 10.0.0.2 remote-as 65100
 neighbor 10.0.0.2 description iBGP-PE-East-1-R2
 neighbor 10.0.0.2 update-source Loopback0
 !
 address-family ipv4
  neighbor 10.1.56.6 activate
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 next-hop-self
 exit-address-family
!
end
