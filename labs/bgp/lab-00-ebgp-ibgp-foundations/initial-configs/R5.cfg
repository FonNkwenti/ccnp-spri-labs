hostname R5
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
 no shutdown
!
interface GigabitEthernet2
 description Link to R4 P-router (L5)
 ip address 10.1.45.5 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description Link to R6 External-SP-Peer (L7)
 ip address 10.1.56.5 255.255.255.0
 no shutdown
!
end
