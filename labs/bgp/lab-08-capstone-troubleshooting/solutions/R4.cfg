hostname R4
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Status: Syntactically translated from the IOS sibling solution.
!         Needs EVE-NG verification.
! Role: P-router / Route Reflector (AS 65100, cluster-id 10.0.0.4).
! XR notes: 'cluster-id' lives under the AF in XR; route-reflector-client is
! a per-AF property; 'send-community' is implied when route-policy emits it
! (XR has no 'send-community both' — communities propagate by default unless
! a policy strips them).
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.4 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description Link to R2 PE-East-1 (L3 OSPF/iBGP)
 ipv4 address 10.1.24.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description Link to R3 PE-East-2 (L4 OSPF/iBGP)
 ipv4 address 10.1.34.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description Link to R5 PE-West (L5 OSPF/iBGP)
 ipv4 address 10.1.45.4 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.4
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
  interface GigabitEthernet0/0/0/1
  exit
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
route-policy PASS
  pass
end-policy
!
router bgp 65100
 bgp router-id 10.0.0.4
 address-family ipv4 unicast
 exit
 neighbor-group RR-CLIENTS
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   route-reflector-client
   route-policy PASS in
   route-policy PASS out
  exit
 exit
 neighbor 10.0.0.2
  use neighbor-group RR-CLIENTS
  description iBGP-RR-client-R2
 exit
 neighbor 10.0.0.3
  use neighbor-group RR-CLIENTS
  description iBGP-RR-client-R3
 exit
 neighbor 10.0.0.5
  use neighbor-group RR-CLIENTS
  description iBGP-RR-client-R5
 exit
 bgp cluster-id 10.0.0.4
exit
!
end
