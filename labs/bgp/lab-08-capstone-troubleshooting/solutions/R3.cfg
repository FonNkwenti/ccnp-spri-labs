hostname R3
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Status: Syntactically translated from the IOS sibling solution.
!         Needs EVE-NG verification.
! Role: PE East-2 multihome backup (AS 65100). eBGP to R1 (CE backup), iBGP
! to R4 (RR). Ingress policy on the eBGP session: tag with community
! 65100:200 + extcommunity SOO 65001:1; enforce maximum-prefix 100/75 with
! restart 5; ttl-security hops 1.
! XR notes: 'extcommunity-set rt' for SOO (XR uses rt-set type 'rt' or
! 'soo' — soo here keeps semantic clarity). 'maximum-prefix' under AF.
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.3 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description Link to R1 Customer-A-CE (L2 eBGP backup)
 ipv4 address 10.1.13.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description Link to R4 P-router/RR (L4 OSPF/iBGP)
 ipv4 address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description Link to R2 PE-East-1 (L6 OSPF IGP)
 ipv4 address 10.1.23.3 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/1
  exit
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
prefix-set CUST-A-BACKUP
  172.16.1.0/24
end-set
!
extcommunity-set soo SOO_CUSTA
  65001:1
end-set
!
community-set CUST-A-BACKUP-COM
  65100:200
end-set
!
route-policy FROM-CUST-A-BACKUP
  if destination in CUST-A-BACKUP then
    set community CUST-A-BACKUP-COM additive
    set extcommunity soo SOO_CUSTA
  endif
  pass
end-policy
!
route-policy PASS
  pass
end-policy
!
router bgp 65100
 bgp router-id 10.0.0.3
 address-family ipv4 unicast
 exit
 neighbor 10.1.13.1
  remote-as 65001
  description Customer-A-CE-R1-backup
  ttl-security
  address-family ipv4 unicast
   route-policy FROM-CUST-A-BACKUP in
   route-policy PASS out
   maximum-prefix 100 75 restart 5
  exit
 exit
 neighbor 10.0.0.4
  remote-as 65100
  description iBGP-RR-R4
  update-source Loopback0
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
   next-hop-self
  exit
 exit
exit
!
end
