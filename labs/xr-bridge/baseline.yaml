# ──────────────────────────────────────────────────────────────────────────────
# Core topology — diamond, same physical shape as labs/mpls and
# labs/segment-routing on purpose. RAM peak ≈ 28.5 GB:
#   4×XRv (light, ~3 GB)  + 1×XRv9k (~16 GB) + 1×IOSv (~0.5 GB)
# ──────────────────────────────────────────────────────────────────────────────
core_topology:
  devices:
    - name: XR1
      platform: xrv
      role: "SP core / IS-IS L2 / LDP / iBGP RR client (lab-01) / 6PE PE-ingress (lab-03) / TI-LFA (lab-05)"
      loopback0: "10.0.0.1/32"
      loopback0_v6: "2001:db8::1/128"
      bgp_as: 65100
      isis_net: "49.0001.0000.0000.0001.00"

    - name: XR2
      platform: xrv
      role: "SP core / IS-IS L2 / LDP / iBGP RR (lab-01) / RSVP-TE midpoint (lab-02)"
      loopback0: "10.0.0.2/32"
      loopback0_v6: "2001:db8::2/128"
      bgp_as: 65100
      isis_net: "49.0001.0000.0000.0002.00"

    - name: XR3
      platform: xrv
      role: "SP core / IS-IS L2 / LDP / second IGP path for LFA / multicast RP candidate (lab-04)"
      loopback0: "10.0.0.3/32"
      loopback0_v6: "2001:db8::3/128"
      bgp_as: 65100
      isis_net: "49.0001.0000.0000.0003.00"

    - name: XR9k
      platform: xrv9k
      role: "Feature-anchor PE / IS-IS L2 / LDP / 6PE PE-egress (lab-03 — primary 1.6.c) / NSR demo target (lab-05) / advanced multicast (lab-04)"
      loopback0: "10.0.0.4/32"
      loopback0_v6: "2001:db8::4/128"
      bgp_as: 65100
      isis_net: "49.0001.0000.0000.0004.00"

    - name: IOS
      platform: iosv
      role: "Translation reference — eBGP customer to XR9k (lab-01+); IOS-side view of attributes/communities/route-maps round-tripping through XR PEs"
      loopback0: "10.0.0.5/32"
      bgp_as: 65200

  links:
    - id: L1
      source: "XR1:GigabitEthernet0/0/0/0"
      target: "XR2:GigabitEthernet0/0/0/0"
      subnet: "10.1.12.0/30"
      purpose: "SP core (IS-IS L2 + LDP from lab-00)"
    - id: L2
      source: "XR3:GigabitEthernet0/0/0/0"
      target: "XR9k:GigabitEthernet0/0/0/0"
      subnet: "10.1.34.0/30"
      purpose: "SP core (IS-IS L2 + LDP from lab-00)"
    - id: L3
      source: "XR1:GigabitEthernet0/0/0/1"
      target: "XR3:GigabitEthernet0/0/0/1"
      subnet: "10.1.13.0/30"
      purpose: "SP core (IS-IS L2 + LDP from lab-00); LFA primary alternate"
    - id: L4
      source: "XR2:GigabitEthernet0/0/0/1"
      target: "XR9k:GigabitEthernet0/0/0/1"
      subnet: "10.1.24.0/30"
      purpose: "SP core (IS-IS L2 + LDP from lab-00); RSVP-TE alternate path"
    - id: L5
      source: "XR9k:GigabitEthernet0/0/0/2"
      target: "IOS:GigabitEthernet0/1"
      subnet: "10.1.45.0/30"
      purpose: "eBGP boundary AS 65100↔AS 65200 (lab-01+)"

# ──────────────────────────────────────────────────────────────────────────────
# Optional topology — XR5 joins lab-04 as the multicast source-side router
# ──────────────────────────────────────────────────────────────────────────────
optional_topology:
  devices:
    - name: XR5
      platform: xrv
      role: "Multicast source-side router (lab-04 only); IS-IS L2"
      loopback0: "10.0.0.6/32"
      isis_net: "49.0001.0000.0000.0006.00"
      boots_at: lab-04

  links:
    - id: L6
      source: "XR1:GigabitEthernet0/0/0/2"
      target: "XR5:GigabitEthernet0/0/0/0"
      subnet: "10.1.16.0/30"
      purpose: "Multicast source attachment (lab-04+)"

# ──────────────────────────────────────────────────────────────────────────────
# Lab list — all labs spec-only at present
# ──────────────────────────────────────────────────────────────────────────────
labs:
  - id: lab-00-xr-cli-and-commit-model
    title: "IOS-XR CLI, Commit Model, and Config Groups"
    status: spec_only
    progressive: true
  - id: lab-01-xr-bgp-and-policy
    title: "XR BGP — RR, Confederations, RPL End-to-End"
    status: spec_only
    progressive: true
  - id: lab-02-xr-mpls-stack
    title: "XR MPLS — LDP, BGP-LU, BGP-free Core, RSVP-TE"
    status: spec_only
    progressive: true
  - id: lab-03-xr-6pe
    title: "XR 6PE — IPv6 over MPLS"
    status: spec_only
    progressive: true
    blueprint_primary: ["1.6.c"]
  - id: lab-04-xr-multicast
    title: "XR Multicast — PIM-SM and mLDP on XR"
    status: spec_only
    progressive: true
  - id: lab-05-xr-convergence
    title: "XR Convergence — TI-LFA, BFD, NSR, GR"
    status: spec_only
    progressive: true
    blueprint_primary: ["1.7.b", "1.7.c"]
