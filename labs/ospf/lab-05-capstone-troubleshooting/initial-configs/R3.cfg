hostname R3
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! TROUBLESHOOTING faults preserved (translated to XR syntax):
!  Fault A: 'dead-interval 80' on Area 2 link → Hello/Dead mismatch, R3↔R4
!           OSPF adjacency stuck in INIT/EXSTART. Default is 40s.
!  Fault B: REDIST_STATIC route-policy drops 192.168.66.0/24 → R3 advertises
!           no Type 5 LSA for the external prefix; R1/R4/R5 cannot reach R6.
! Student tasks:
!  1. Identify dead-interval mismatch via 'show ospf neighbor' / 'show ospf interface GigE0/0/0/1'
!  2. Identify drop in REDIST_STATIC via 'show route-policy REDIST_STATIC' and
!     'show ospf database external'
! ──────────────────────────────────────────────────────────────────────────────
!
router static
 address-family ipv4 unicast
  192.168.66.0/24 10.1.36.6
 exit
 address-family ipv6 unicast
  2001:db8:66::/64 2001:db8:36::6
 exit
exit
!
prefix-set BLOCK_EXT
  192.168.66.0/24
end-set
!
route-policy REDIST_STATIC
  if destination in BLOCK_EXT then
    drop
  endif
  pass
end-policy
!
interface Loopback0
 ipv4 address 10.0.0.3 255.255.255.255
 ipv6 address 2001:db8::3/128
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.23.3 255.255.255.0
 ipv6 address 2001:db8:23::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.34.3 255.255.255.0
 ipv6 address 2001:db8:34::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/2
 ipv4 address 10.1.35.3 255.255.255.0
 ipv6 address 2001:db8:35::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/3
 ipv4 address 10.1.36.3 255.255.255.0
 ipv6 address 2001:db8:36::3/64
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 redistribute static route-policy REDIST_STATIC
 summary-prefix 192.168.0.0/16
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
 exit
 area 2
  stub no-summary
  interface GigabitEthernet0/0/0/1
   dead-interval 80
  exit
 exit
 area 3
  nssa
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
router ospfv3 1
 router-id 10.0.0.3
 redistribute static route-policy REDIST_STATIC
 address-family ipv6 unicast
  summary-prefix 2001:db8:66::/48
 exit
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
 exit
 area 2
  stub no-summary
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 3
  nssa
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
end
