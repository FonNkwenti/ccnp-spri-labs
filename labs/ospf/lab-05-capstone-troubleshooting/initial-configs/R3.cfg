hostname R3
!
no ip domain-lookup
ipv6 unicast-routing
!
ip route 192.168.66.0 255.255.255.0 10.1.36.6
ipv6 route 2001:DB8:66::/64 2001:DB8:36::6
!
ip prefix-list BLOCK_EXT seq 5 deny 192.168.66.0/24
ip prefix-list BLOCK_EXT seq 10 permit 0.0.0.0/0 le 32
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ipv6 address 2001:DB8::3/128
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/0
 ip address 10.1.23.3 255.255.255.0
 ipv6 address 2001:DB8:23::3/64
 duplex full
 no shutdown
 ospfv3 1 ipv6 area 0
!
interface GigabitEthernet0/1
 ip address 10.1.34.3 255.255.255.0
 ipv6 address 2001:DB8:34::3/64
 duplex full
 no shutdown
 ip ospf dead-interval 80
 ospfv3 1 ipv6 area 2
!
interface GigabitEthernet0/2
 ip address 10.1.35.3 255.255.255.0
 ipv6 address 2001:DB8:35::3/64
 duplex full
 no shutdown
 ospfv3 1 ipv6 area 3
!
interface GigabitEthernet0/3
 ip address 10.1.36.3 255.255.255.0
 ipv6 address 2001:DB8:36::3/64
 duplex full
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 network 10.0.0.3 0.0.0.0 area 0
 network 10.1.23.3 0.0.0.0 area 0
 network 10.1.34.3 0.0.0.0 area 2
 network 10.1.35.3 0.0.0.0 area 3
 area 2 stub no-summary
 area 3 nssa
 redistribute static subnets
 summary-address 192.168.0.0 255.255.0.0
 distribute-list prefix BLOCK_EXT out static
!
router ospfv3 1
 router-id 10.0.0.3
 !
 address-family ipv6 unicast
  area 2 stub no-summary
  area 3 nssa
  redistribute static
  summary-prefix 2001:DB8:66::/48
 exit-address-family
!
end
