hostname R2
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! TROUBLESHOOTING fault preserved: 'range 172.16.0.0/23' is too tight to
! summarize the full Area 1 /21 set (172.16.0.0/21 contains 8× /24 routes).
! Student task: identify and correct the summary mask via 'show ospf summary-prefix'
! and 'show route ospf' on R3.
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
 ipv6 address 2001:db8::2/128
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.12.2 255.255.255.0
 ipv6 address 2001:db8:12::2/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.23.2 255.255.255.0
 ipv6 address 2001:db8:23::2/64
 no shutdown
!
router ospf 1
 router-id 10.0.0.2
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 1
  range 172.16.0.0/23
  interface GigabitEthernet0/0/0/0
  exit
 exit
exit
!
router ospfv3 1
 router-id 10.0.0.2
 address-family ipv6 unicast
 exit
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 1
  range 2001:db8:1::/48
  interface GigabitEthernet0/0/0/0
  exit
 exit
exit
!
end
