hostname R2
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Status: Syntactically translated from the IOS sibling solution.
!         Needs EVE-NG verification: confirm OSPFv2 + OSPFv3 adjacencies to
!         R1 (Area 1) and R3 (Area 0), and Type 3 summarization of
!         172.16.0.0/21 (IPv4) + 2001:db8:1::/48 (IPv6) into Area 0.
! Role: ABR (Area 0 / Area 1) with inter-area summarization.
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
 ipv6 address 2001:db8::2/128
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.12.2 255.255.255.0
 ipv6 address 2001:db8:12::2/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.23.2 255.255.255.0
 ipv6 address 2001:db8:23::2/64
 no shutdown
!
! ──────────────────────────────────────────────────────────────────────────────
! OSPFv2 — XR puts area/interface assignment under the protocol stanza, not
! per-interface as in IOS. 'range' summarizes Area 1 → Area 0 (Type 3 LSA).
! ──────────────────────────────────────────────────────────────────────────────
router ospf 1
 router-id 10.0.0.2
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 1
  range 172.16.0.0/21
  interface GigabitEthernet0/0/0/0
  exit
 exit
exit
!
! ──────────────────────────────────────────────────────────────────────────────
! OSPFv3 — same per-area structure under address-family ipv6 unicast.
! ──────────────────────────────────────────────────────────────────────────────
router ospfv3 1
 router-id 10.0.0.2
 address-family ipv6 unicast
 exit
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 1
  range 2001:db8:1::/48
  interface GigabitEthernet0/0/0/0
  exit
 exit
exit
!
end
