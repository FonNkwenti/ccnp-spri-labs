hostname R3
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Status: Syntactically translated from the IOS sibling solution.
!         Needs EVE-NG verification: confirm Area 0 / Area 2 / Area 3 LSA
!         types per area attribute (totally stubby blocks Type 3/4/5 except
!         default; NSSA permits Type 7), External LSA injection from R6
!         static, and Type 3 summary 192.168.0.0/16 + 2001:db8:66::/48.
! Role: Triple ABR (Area 0/2/3) + ASBR (R6 external).
! ──────────────────────────────────────────────────────────────────────────────
!
router static
 address-family ipv4 unicast
  192.168.66.0/24 10.1.36.6
 exit
 address-family ipv6 unicast
  2001:db8:66::/64 2001:db8:36::6
 exit
exit
!
interface Loopback0
 ipv4 address 10.0.0.3 255.255.255.255
 ipv6 address 2001:db8::3/128
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.23.3 255.255.255.0
 ipv6 address 2001:db8:23::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.34.3 255.255.255.0
 ipv6 address 2001:db8:34::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/2
 ipv4 address 10.1.35.3 255.255.255.0
 ipv6 address 2001:db8:35::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/3
 ipv4 address 10.1.36.3 255.255.255.0
 ipv6 address 2001:db8:36::3/64
 no shutdown
!
! ──────────────────────────────────────────────────────────────────────────────
! Route-policy — XR redistribute REQUIRES an explicit policy. REDIST_STATIC
! permits all static routes (the IOS 'redistribute static subnets' default).
! ──────────────────────────────────────────────────────────────────────────────
route-policy REDIST_STATIC
  pass
end-policy
!
! ──────────────────────────────────────────────────────────────────────────────
! OSPFv2 — Area 2 totally stubby (no inter-area + no external + default-only),
! Area 3 NSSA, R3 ASBR redistributes static. summary-prefix coalesces Type 5.
! ──────────────────────────────────────────────────────────────────────────────
router ospf 1
 router-id 10.0.0.3
 redistribute static route-policy REDIST_STATIC
 summary-prefix 192.168.0.0/16
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
 exit
 area 2
  stub no-summary
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 3
  nssa
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
router ospfv3 1
 router-id 10.0.0.3
 redistribute static route-policy REDIST_STATIC
 address-family ipv6 unicast
  summary-prefix 2001:db8:66::/48
 exit
 area 0
  interface Loopback0
   passive enable
  exit
  interface GigabitEthernet0/0/0/0
  exit
 exit
 area 2
  stub no-summary
  interface GigabitEthernet0/0/0/1
  exit
 exit
 area 3
  nssa
  interface GigabitEthernet0/0/0/2
  exit
 exit
exit
!
end
