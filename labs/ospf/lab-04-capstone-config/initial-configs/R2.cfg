hostname R2
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Reminder: XR uses 'commit' (two-stage), '!' is a comment (use 'exit' to leave
! sub-modes), and OSPFv3 lives under 'router ospfv3' with per-AF blocks.
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
 ipv6 address 2001:db8::2/128
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.12.2 255.255.255.0
 ipv6 address 2001:db8:12::2/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.23.2 255.255.255.0
 ipv6 address 2001:db8:23::2/64
 no shutdown
!
end
