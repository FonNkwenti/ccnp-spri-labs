hostname R3
!
! ──────────────────────────────────────────────────────────────────────────────
! Platform: IOS XRv (light, 6.1.x) — XR-mixed capstone retrofit
! Reminder: XR uses 'commit' (two-stage), '!' is a comment (use 'exit' to leave
! sub-modes), redistribute static requires a route-policy in XR (no implicit allow).
! ──────────────────────────────────────────────────────────────────────────────
!
interface Loopback0
 ipv4 address 10.0.0.3 255.255.255.255
 ipv6 address 2001:db8::3/128
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.23.3 255.255.255.0
 ipv6 address 2001:db8:23::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.34.3 255.255.255.0
 ipv6 address 2001:db8:34::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/2
 ipv4 address 10.1.35.3 255.255.255.0
 ipv6 address 2001:db8:35::3/64
 no shutdown
!
interface GigabitEthernet0/0/0/3
 ipv4 address 10.1.36.3 255.255.255.0
 ipv6 address 2001:db8:36::3/64
 no shutdown
!
end
