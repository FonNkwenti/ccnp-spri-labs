hostname R5
!
no ip domain-lookup
!
ipv6 unicast-routing
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
 ipv6 address 2001:db8::5/128
 no shutdown
!
interface Loopback1
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:db8:5::1/64
 no shutdown
!
interface Loopback2
 ip address 192.168.55.1 255.255.255.0
 ipv6 address 2001:db8:55::1/64
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R3 (L4)
 ip address 10.1.35.5 255.255.255.0
 ipv6 address 2001:db8:35::5/64
 no shutdown
!
ip prefix-list NSSA_LO2 seq 5 permit 192.168.55.0/24
!
route-map NSSA_EXTERNAL permit 10
 match ip address prefix-list NSSA_LO2
!
router ospf 1
 router-id 10.0.0.5
 network 10.0.0.5 0.0.0.0 area 3
 network 10.1.35.0 0.0.0.255 area 3
 network 172.16.5.0 0.0.0.255 area 3
 area 3 nssa
 redistribute connected subnets route-map NSSA_EXTERNAL
!
router ospfv3 1
 router-id 10.0.0.5
 !
 address-family ipv6 unicast
  area 3 nssa
 exit-address-family
!
interface Loopback0
 ospfv3 1 ipv6 area 3
!
interface Loopback1
 ospfv3 1 ipv6 area 3
!
interface Loopback2
 ospfv3 1 ipv6 area 3
!
interface GigabitEthernet0/0
 ospfv3 1 ipv6 area 3
!
end
