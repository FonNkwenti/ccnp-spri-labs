! R5 - Area 3 internal router
hostname R5
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
 ipv6 address 2001:db8::5/128
!
interface Loopback1
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:db8:5::1/64
!
interface GigabitEthernet0/0
 ip address 10.1.35.2 255.255.255.0
 ipv6 address 2001:db8:35::2/64
 no shutdown
!
end
