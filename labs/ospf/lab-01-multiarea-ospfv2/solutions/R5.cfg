hostname R5
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.5 255.255.255.255
 ipv6 address 2001:db8::5/128
!
interface Loopback1
 ip address 172.16.5.1 255.255.255.0
 ipv6 address 2001:db8:5::1/64
!
interface GigabitEthernet0/0
 ip address 10.1.35.2 255.255.255.0
 ipv6 address 2001:db8:35::2/64
 no shutdown
!
router ospf 1
 router-id 10.0.0.5
 network 10.0.0.5 0.0.0.0 area 3
 network 172.16.5.0 0.0.0.255 area 3
 network 10.1.35.0 0.0.0.255 area 3
!
ipv6 router ospf 1
 router-id 10.0.0.5
!
interface Loopback0
 ipv6 ospf 1 area 3
!
interface Loopback1
 ipv6 ospf 1 area 3
!
interface GigabitEthernet0/0
 ipv6 ospf 1 area 3
!
end
