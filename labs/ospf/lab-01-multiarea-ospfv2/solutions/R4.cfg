hostname R4
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.4 255.255.255.255
 ipv6 address 2001:db8::4/128
!
interface Loopback1
 ip address 172.16.4.1 255.255.255.0
 ipv6 address 2001:db8:4::1/64
!
interface GigabitEthernet0/0
 ip address 10.1.34.2 255.255.255.0
 ipv6 address 2001:db8:34::2/64
 no shutdown
!
router ospf 1
 router-id 10.0.0.4
 network 10.0.0.4 0.0.0.0 area 2
 network 172.16.4.0 0.0.0.255 area 2
 network 10.1.34.0 0.0.0.255 area 2
!
ipv6 router ospf 1
 router-id 10.0.0.4
!
interface Loopback0
 ipv6 ospf 1 area 2
!
interface Loopback1
 ipv6 ospf 1 area 2
!
interface GigabitEthernet0/0
 ipv6 ospf 1 area 2
!
end
