hostname R3
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ipv6 address 2001:db8::3/128
!
interface GigabitEthernet0/0
 ip address 10.1.23.2 255.255.255.0
 ipv6 address 2001:db8:23::2/64
 no shutdown
!
interface GigabitEthernet0/1
 ip address 10.1.34.1 255.255.255.0
 ipv6 address 2001:db8:34::1/64
 no shutdown
!
interface GigabitEthernet0/2
 ip address 10.1.35.1 255.255.255.0
 ipv6 address 2001:db8:35::1/64
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 network 10.0.0.3 0.0.0.0 area 0
 network 10.1.23.0 0.0.0.255 area 0
 network 10.1.34.0 0.0.0.255 area 2
 network 10.1.35.0 0.0.0.255 area 3
!
ipv6 router ospf 1
 router-id 10.0.0.3
!
interface Loopback0
 ipv6 ospf 1 area 0
!
interface GigabitEthernet0/0
 ipv6 ospf 1 area 0
!
interface GigabitEthernet0/1
 ipv6 ospf 1 area 2
!
interface GigabitEthernet0/2
 ipv6 ospf 1 area 3
!
end
