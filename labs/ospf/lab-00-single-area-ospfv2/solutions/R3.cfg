hostname R3
!
no ip domain-lookup
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R2 (L2)
 ip address 10.1.23.3 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 network 10.0.0.3 0.0.0.0 area 0
 network 10.1.23.0 0.0.0.255 area 0
!
end
