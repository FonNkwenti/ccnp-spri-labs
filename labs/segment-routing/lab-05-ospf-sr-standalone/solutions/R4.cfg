hostname R4
!
interface Loopback0
 ipv4 address 10.0.0.4 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description Link-to-R3-L3
 ipv4 address 10.1.34.4 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description Link-to-R1-L4
 ipv4 address 10.1.14.4 255.255.255.0
 no shutdown
!
segment-routing
 global-block 16000 23999
!
router ospf 1
 router-id 10.0.0.4
 segment-routing mpls
 area 0
  interface Loopback0
   passive enable
   prefix-sid index 4
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
  !
 !
!
end
