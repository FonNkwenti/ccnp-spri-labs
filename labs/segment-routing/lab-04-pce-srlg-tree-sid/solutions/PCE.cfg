hostname PCE

interface Loopback0
 ipv4 address 10.0.0.99 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L6 to R2
 ipv4 address 10.1.29.99 255.255.255.0
 no shutdown
!

router static
 address-family ipv4 unicast
  10.0.0.0/24 10.1.29.2
 !
!

router bgp 65100
 bgp router-id 10.0.0.99
 address-family ipv4 unicast
 !
 address-family link-state link-state
 !
 neighbor 10.0.0.2
  remote-as 65100
  update-source Loopback0
  description iBGP-LS to R2
  address-family link-state link-state
  !
 !
!

pce
 address ipv4 10.0.0.99
 segment-routing
  traffic-eng
  !
 !
!

segment-routing
 traffic-eng
  p2mp
   policy TREE_1
    color 100 endpoint ipv4 10.0.0.1
    candidate-paths
     preference 100
      dynamic
      !
     !
    !
   !
  !
 !
!
