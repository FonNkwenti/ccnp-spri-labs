hostname R2

interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L1 to R1
 ipv4 address 10.1.12.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L2 to R3
 ipv4 address 10.1.23.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description L6 to PCE
 ipv4 address 10.1.29.2 255.255.255.0
 no shutdown
!

segment-routing
 global-block 16000 23999
 traffic-eng
  affinity-map
   name RED bit-position 0
   name BLUE bit-position 1
  !
  interface GigabitEthernet0/0/0/1
   affinity
    name BLUE
   !
  !
 !
!

mpls ldp
 router-id 10.0.0.2
 interface GigabitEthernet0/0/0/0
 !
 interface GigabitEthernet0/0/0/1
 !
!

router isis CORE
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 address-family ipv4 unicast
  metric-style wide
  mpls traffic-eng level-2-only
  mpls traffic-eng router-id Loopback0
  segment-routing mpls
  segment-routing mpls sr-prefer
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
   prefix-sid index 2
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   bfd fast-detect
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   bfd fast-detect
  !
 !
!
