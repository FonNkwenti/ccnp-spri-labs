hostname R3

interface Loopback0
 ipv4 address 10.0.0.3 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L2 to R2
 ipv4 address 10.1.23.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L3 to R4
 ipv4 address 10.1.34.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description L5 to R1
 ipv4 address 10.1.13.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/3
 description L8 to CE2
 ipv4 address 10.1.33.3 255.255.255.0
 no shutdown
!

extcommunity-set opaque COLOR_10
 10
end-set
!

route-policy PASS
 pass
end-policy
!

route-policy RP_CE2_IN
 set extcommunity color COLOR_10 additive
 pass
end-policy
!

segment-routing
 global-block 16000 23999
 traffic-eng
  affinity-map
   name RED bit-position 0
   name BLUE bit-position 1
  !
  interface GigabitEthernet0/0/0/0
   affinity
    name BLUE
   !
  !
  interface GigabitEthernet0/0/0/1
   affinity
    name RED
   !
  !
 !
!

mpls ldp
 router-id 10.0.0.3
 interface GigabitEthernet0/0/0/0
 !
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
!

router isis CORE
 net 49.0001.0000.0000.0003.00
 is-type level-2-only
 address-family ipv4 unicast
  metric-style wide
  mpls traffic-eng level-2-only
  mpls traffic-eng router-id Loopback0
  segment-routing mpls
  segment-routing mpls sr-prefer
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
   prefix-sid index 3
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   bfd fast-detect
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   bfd fast-detect
  !
 !
 interface GigabitEthernet0/0/0/2
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
   bfd fast-detect
  !
 !
!

router bgp 65100
 bgp router-id 10.0.0.3
 address-family ipv4 unicast
 !
 neighbor 10.0.0.1
  remote-as 65100
  update-source Loopback0
  description iBGP to R1
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  !
 !
 neighbor 10.1.33.12
  remote-as 65102
  description eBGP to CE2
  address-family ipv4 unicast
   route-policy RP_CE2_IN in
   route-policy PASS out
  !
 !
!
