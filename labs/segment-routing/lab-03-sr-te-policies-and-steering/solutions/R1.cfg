hostname R1

interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description L1 to R2
 ipv4 address 10.1.12.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L4 to R4
 ipv4 address 10.1.14.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description L5 to R3
 ipv4 address 10.1.13.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/3
 description L7 to CE1
 ipv4 address 10.1.11.1 255.255.255.0
 no shutdown
!

extcommunity-set opaque COLOR_10
 10
end-set
!

route-policy PASS
 pass
end-policy
!

route-policy RP_CE1_IN
 pass
end-policy
!

route-policy RP_R3_IN
 pass
end-policy
!

segment-routing
 global-block 16000 23999
 traffic-eng
  affinity-map
   name RED bit-position 0
   name BLUE bit-position 1
  !
  segment-list EXPLICIT_R4_R3
   index 10 mpls label 16004
   index 20 mpls label 16003
  !
  policy COLOR_10
   color 10 end-point ipv4 10.0.0.3
   candidate-paths
    preference 200
     explicit segment-list EXPLICIT_R4_R3
    !
    preference 100
     dynamic
      metric type igp
     !
    !
   !
  !
  policy COLOR_20
   color 20 end-point ipv4 10.0.0.3
   candidate-paths
    preference 100
     dynamic
      metric type igp
      constraints
       affinity
        exclude-any
         name RED
        !
       !
      !
     !
    !
   !
  !
  policy COLOR_30
   color 30 end-point ipv4 10.0.0.3
   candidate-paths
    preference 100
     dynamic
      metric type te
     !
    !
   !
  !
  on-demand color 10
   dynamic
    metric type igp
   !
  !
  interface GigabitEthernet0/0/0/0
   metric 1000
  !
 !
!

mpls ldp
 router-id 10.0.0.1
 interface GigabitEthernet0/0/0/0
 !
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
!

router isis CORE
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 address-family ipv4 unicast
  metric-style wide
  mpls traffic-eng level-2-only
  mpls traffic-eng router-id Loopback0
  segment-routing mpls
  segment-routing mpls sr-prefer
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
   prefix-sid index 1
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
  !
 !
 interface GigabitEthernet0/0/0/2
  point-to-point
  bfd minimum-interval 50
  bfd multiplier 3
  address-family ipv4 unicast
   fast-reroute per-prefix
   fast-reroute per-prefix ti-lfa
  !
 !
!

router bgp 65100
 bgp router-id 10.0.0.1
 address-family ipv4 unicast
 !
 neighbor 10.0.0.3
  remote-as 65100
  update-source Loopback0
  description iBGP to R3
  address-family ipv4 unicast
   route-policy RP_R3_IN in
   route-policy PASS out
  !
 !
 neighbor 10.1.11.11
  remote-as 65101
  description eBGP to CE1
  address-family ipv4 unicast
   route-policy RP_CE1_IN in
   route-policy PASS out
  !
 !
!
