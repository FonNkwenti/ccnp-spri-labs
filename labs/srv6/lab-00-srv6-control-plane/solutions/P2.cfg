hostname P2

interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
 ipv6 address fc00:0:2::1/128
!
interface GigabitEthernet0/0/0/0
 description L1 to P1
 ipv4 address 10.10.1.2 255.255.255.252
 ipv6 address fc00:10:1::2/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L2 to P3
 ipv4 address 10.10.2.1 255.255.255.252
 ipv6 address fc00:10:2::1/64
 no shutdown
!

segment-routing
 srv6
  encapsulation
   source-address fc00:0:2::1
  !
  locators
   locator P2_LOC
    prefix fc00:0:2::/48
   !
  !
 !
!

router isis CORE
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 address-family ipv4 unicast
  metric-style wide
  segment-routing srv6
   locator P2_LOC
  !
 !
 address-family ipv6 unicast
  metric-style wide
  segment-routing srv6
   locator P2_LOC
  !
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
!
commit
