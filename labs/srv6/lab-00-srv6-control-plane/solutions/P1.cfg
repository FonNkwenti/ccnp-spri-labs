hostname P1

interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
 ipv6 address fc00:0:1::1/128
!
interface GigabitEthernet0/0/0/0
 description L1 to P2
 ipv4 address 10.10.1.1 255.255.255.252
 ipv6 address fc00:10:1::1/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description L4 to P4
 ipv4 address 10.10.4.2 255.255.255.252
 ipv6 address fc00:10:4::2/64
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description L5 to P3 (diagonal)
 ipv4 address 10.10.5.1 255.255.255.252
 ipv6 address fc00:10:5::1/64
 no shutdown
!
interface GigabitEthernet0/0/0/3
 description L6 to PE1
 ipv4 address 10.10.6.2 255.255.255.252
 ipv6 address fc00:10:6::2/64
 no shutdown
!

segment-routing
 srv6
  encapsulation
   source-address fc00:0:1::1
  !
  locators
   locator P1_LOC
    prefix fc00:0:1::/48
   !
  !
 !
!

router isis CORE
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 address-family ipv4 unicast
  metric-style wide
  segment-routing srv6
   locator P1_LOC
  !
 !
 address-family ipv6 unicast
  metric-style wide
  segment-routing srv6
   locator P1_LOC
  !
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/2
  point-to-point
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/3
  point-to-point
  address-family ipv4 unicast
  !
  address-family ipv6 unicast
  !
 !
!
commit
