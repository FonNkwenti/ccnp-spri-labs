# ──────────────────────────────────────────────────────────────────────────────
# Core topology — present in every lab of this topic. IPs never change.
#   Ring: P1-P2-P3-P4 with diagonal P1↔P3.
#   - P1, P2, P3, P4: transit nodes, IS-IS L2 dual-stack, SRv6 locators only.
#     No BGP on P nodes (BGP-free core principle from mpls topic).
#   - PE1, PE2: edge nodes, iBGP AS 65000, BGP SRv6 L3VPN from lab-02.
#   - CE1 (AS 65101), CE2 (AS 65102): IOSv customer edges, optional from lab-02.
# SRv6 locator block: fc00:0::/32
#   P1=fc00:0:1::/48  P2=fc00:0:2::/48  P3=fc00:0:3::/48  P4=fc00:0:4::/48
#   PE1=fc00:0:11::/48  PE2=fc00:0:12::/48
# ──────────────────────────────────────────────────────────────────────────────
core_topology:
  devices:
    - name: P1
      platform: xrv9k
      role: "P core (BGP-free); IS-IS L2 dual-stack; SRv6 locator fc00:0:1::/48; hub node (ring + diagonal + PE1 attachment); all 4 interfaces used"
      loopback0: "10.0.0.1/32"
      loopback0_ipv6: "fc00:0:1::1/128"
      bgp_as: null                             # P nodes have no BGP — invariant
      isis_net: "49.0001.0000.0000.0001.00"
      srv6_locator: "fc00:0:1::/48"
      console_port: null

    - name: P2
      platform: xrv9k
      role: "P core (BGP-free); IS-IS L2 dual-stack; SRv6 locator fc00:0:2::/48; apex node (ring only, 2 interfaces)"
      loopback0: "10.0.0.2/32"
      loopback0_ipv6: "fc00:0:2::1/128"
      bgp_as: null
      isis_net: "49.0001.0000.0000.0002.00"
      srv6_locator: "fc00:0:2::/48"
      console_port: null

    - name: P3
      platform: xrv9k
      role: "P core (BGP-free); IS-IS L2 dual-stack; SRv6 locator fc00:0:3::/48; hub node (ring + diagonal + PE2 attachment); all 4 interfaces used"
      loopback0: "10.0.0.3/32"
      loopback0_ipv6: "fc00:0:3::1/128"
      bgp_as: null
      isis_net: "49.0001.0000.0000.0003.00"
      srv6_locator: "fc00:0:3::/48"
      console_port: null

    - name: P4
      platform: xrv9k
      role: "P core (BGP-free); IS-IS L2 dual-stack; SRv6 locator fc00:0:4::/48; apex node (ring only, 2 interfaces)"
      loopback0: "10.0.0.4/32"
      loopback0_ipv6: "fc00:0:4::1/128"
      bgp_as: null
      isis_net: "49.0001.0000.0000.0004.00"
      srv6_locator: "fc00:0:4::/48"
      console_port: null

    - name: PE1
      platform: xrv9k
      role: "SP edge; iBGP AS 65000; BGP SRv6 L3VPN (End.DT4) from lab-02; IS-IS L2; SRv6 locator fc00:0:11::/48; SRv6↔SR-MPLS interworking gateway from lab-02"
      loopback0: "10.0.0.11/32"
      loopback0_ipv6: "fc00:0:11::1/128"
      bgp_as: 65000
      isis_net: "49.0001.0000.0000.0011.00"
      srv6_locator: "fc00:0:11::/48"
      console_port: null

    - name: PE2
      platform: xrv9k
      role: "SP edge; iBGP AS 65000; BGP SRv6 L3VPN (End.DT4) from lab-02; IS-IS L2; SRv6 locator fc00:0:12::/48"
      loopback0: "10.0.0.12/32"
      loopback0_ipv6: "fc00:0:12::1/128"
      bgp_as: 65000
      isis_net: "49.0001.0000.0000.0012.00"
      srv6_locator: "fc00:0:12::/48"
      console_port: null

  links:
    - id: L1
      source: "P1:GigabitEthernet0/0/0/0"
      target: "P2:GigabitEthernet0/0/0/0"
      subnet: "10.10.1.0/30"
      ipv6_subnet: "fc00:10:1::/64"
      purpose: "Ring leg P1↔P2 (top); IS-IS L2 adjacency; End.X SID; Flex-Algo via-P2 path leg 1"

    - id: L2
      source: "P2:GigabitEthernet0/0/0/1"
      target: "P3:GigabitEthernet0/0/0/0"
      subnet: "10.10.2.0/30"
      ipv6_subnet: "fc00:10:2::/64"
      purpose: "Ring leg P2↔P3 (right); IS-IS L2 adjacency; End.X SID; Flex-Algo via-P2 path leg 2"

    - id: L3
      source: "P3:GigabitEthernet0/0/0/1"
      target: "P4:GigabitEthernet0/0/0/0"
      subnet: "10.10.3.0/30"
      ipv6_subnet: "fc00:10:3::/64"
      purpose: "Ring leg P3↔P4 (bottom); IS-IS L2 adjacency; End.X SID; Flex-Algo via-P4 path leg 1"

    - id: L4
      source: "P4:GigabitEthernet0/0/0/1"
      target: "P1:GigabitEthernet0/0/0/1"
      subnet: "10.10.4.0/30"
      ipv6_subnet: "fc00:10:4::/64"
      purpose: "Ring leg P4↔P1 (left); IS-IS L2 adjacency; End.X SID; Flex-Algo via-P4 path leg 2"

    - id: L5
      source: "P1:GigabitEthernet0/0/0/2"
      target: "P3:GigabitEthernet0/0/0/2"
      subnet: "10.10.5.0/30"
      ipv6_subnet: "fc00:10:5::/64"
      purpose: "P1↔P3 diagonal; shortest IGP-metric path PE1↔PE2 (2 hops); Flex-Algo 128 preferred path; higher TE metric forces Algo-129 traffic via ring"

    - id: L6
      source: "PE1:GigabitEthernet0/0/0/0"
      target: "P1:GigabitEthernet0/0/0/3"
      subnet: "10.10.6.0/30"
      ipv6_subnet: "fc00:10:6::/64"
      purpose: "PE1 access link to P1; IS-IS L2 adjacency; SRv6 L3VPN ingress from lab-02"

    - id: L7
      source: "PE2:GigabitEthernet0/0/0/0"
      target: "P3:GigabitEthernet0/0/0/3"
      subnet: "10.10.7.0/30"
      ipv6_subnet: "fc00:10:7::/64"
      purpose: "PE2 access link to P3; IS-IS L2 adjacency; SRv6 L3VPN egress from lab-02"

# ──────────────────────────────────────────────────────────────────────────────
# Optional devices — IPs pre-reserved; activated at the lab noted below.
# ──────────────────────────────────────────────────────────────────────────────
optional_devices:
  - name: CE1
    platform: iosv
    role: "Customer edge; eBGP AS 65101 to PE1; sources VRF customer-a prefix 192.0.2.0/24"
    loopback0: "192.0.2.1/32"
    bgp_as: 65101
    console_port: null
    available_from: "lab-02-flex-algo-and-l3vpn"
    purpose: "Required for BGP SRv6 L3VPN (4.4.a, 4.4.d) and Flex-Algo service steering"

  - name: CE2
    platform: iosv
    role: "Customer edge; eBGP AS 65102 to PE2; sources VRF customer-a prefix 198.51.100.0/24"
    loopback0: "198.51.100.1/32"
    bgp_as: 65102
    console_port: null
    available_from: "lab-02-flex-algo-and-l3vpn"
    purpose: "Required for BGP SRv6 L3VPN (4.4.a, 4.4.d) and end-to-end VPN path verification"

optional_links:
  - id: L8
    source: "CE1:GigabitEthernet0/0"
    target: "PE1:GigabitEthernet0/0/0/1"
    subnet: "192.0.2.0/30"
